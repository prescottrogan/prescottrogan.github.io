<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#000000"/>

  <!-- Dark shadow layer under eye bumps + body for depth -->
  <circle cx="29" cy="41" r="20" fill="#1e3d14"/>
  <circle cx="71" cy="41" r="20" fill="#1e3d14"/>
  <ellipse cx="50" cy="71" rx="38" ry="25" fill="#1e3d14"/>

  <!-- Main body (bright green) -->
  <ellipse cx="50" cy="69" rx="36" ry="23" fill="#55a63a"/>

  <!-- Eye bumps (bright green) -->
  <circle cx="29" cy="39" r="18" fill="#55a63a"/>
  <circle cx="71" cy="39" r="18" fill="#55a63a"/>

  <!-- Belly / chin (light cream) -->
  <ellipse cx="50" cy="75" rx="21" ry="15" fill="#dde8a0"/>

  <!-- Pupils -->
  <circle cx="29" cy="38" r="12" fill="#0d1a0a"/>
  <circle cx="71" cy="38" r="12" fill="#0d1a0a"/>

  <!-- Eye shine highlights — big and crisp -->
  <circle cx="24" cy="31" r="5" fill="#ffffff"/>
  <circle cx="66" cy="31" r="5" fill="#ffffff"/>

  <!-- Smile -->
  <path d="M37,75 Q50,86 63,75" stroke="#1e3d14" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
