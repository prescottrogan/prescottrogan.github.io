<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Body gradient: bright lime top, deep forest green bottom -->
    <radialGradient id="bodyGrad" cx="45%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#8edc5a"/>
      <stop offset="55%"  stop-color="#4caa28"/>
      <stop offset="100%" stop-color="#2a6212"/>
    </radialGradient>
    <!-- Eye bulge gradient -->
    <radialGradient id="eyeGrad" cx="38%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#9ee862"/>
      <stop offset="60%"  stop-color="#4caa28"/>
      <stop offset="100%" stop-color="#1e4d0e"/>
    </radialGradient>
    <!-- Pupil gradient -->
    <radialGradient id="pupilGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#243d12"/>
      <stop offset="100%" stop-color="#040a02"/>
    </radialGradient>
    <!-- Belly gradient -->
    <radialGradient id="bellyGrad" cx="50%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#f4ffb8"/>
      <stop offset="60%"  stop-color="#d6ed84"/>
      <stop offset="100%" stop-color="#aac940"/>
    </radialGradient>
    <!-- Top-lighting rim for body -->
    <linearGradient id="rimLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <!-- Soft inner glow on pupils -->
    <filter id="eyeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip to round background -->
    <clipPath id="bgClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#000000"/>

  <g clip-path="url(#bgClip)">
    <!-- ── Deep shadow mass ──────────────────── -->
    <circle cx="168" cy="232" r="122" fill="#122808"/>
    <circle cx="344" cy="232" r="122" fill="#122808"/>
    <ellipse cx="256" cy="370" rx="202" ry="140" fill="#122808"/>

    <!-- ── Eye bulges ────────────────────────── -->
    <circle cx="168" cy="226" r="114" fill="url(#eyeGrad)" filter="url(#dropshadow)"/>
    <circle cx="344" cy="226" r="114" fill="url(#eyeGrad)" filter="url(#dropshadow)"/>

    <!-- ── Main body ─────────────────────────── -->
    <ellipse cx="256" cy="362" rx="196" ry="134" fill="url(#bodyGrad)" filter="url(#dropshadow)"/>

    <!-- ── Belly ─────────────────────────────── -->
    <ellipse cx="256" cy="390" rx="120" ry="95" fill="url(#bellyGrad)"/>
    <!-- Belly inner highlight -->
    <ellipse cx="248" cy="374" rx="68" ry="48" fill="#ffffff" opacity="0.13"/>

    <!-- ── Pupils ─────────────────────────────── -->
    <circle cx="168" cy="222" r="78" fill="url(#pupilGrad)"/>
    <circle cx="344" cy="222" r="78" fill="url(#pupilGrad)"/>

    <!-- ── Iris ring (subtle dark green ring) ── -->
    <circle cx="168" cy="222" r="78" fill="none" stroke="#1a3808" stroke-width="6"/>
    <circle cx="344" cy="222" r="78" fill="none" stroke="#1a3808" stroke-width="6"/>

    <!-- ── Primary eye shine (large, crisp) ──── -->
    <circle cx="138" cy="183" r="30" fill="#ffffff"/>
    <circle cx="314" cy="183" r="30" fill="#ffffff"/>

    <!-- ── Secondary shine (small offset) ───── -->
    <circle cx="186" cy="207" r="14" fill="#ffffff" opacity="0.55"/>
    <circle cx="362" cy="207" r="14" fill="#ffffff" opacity="0.55"/>

    <!-- ── Body rim highlight ─────────────────── -->
    <ellipse cx="256" cy="362" rx="196" ry="134" fill="url(#rimLight)"/>

    <!-- ── Smile ──────────────────────────────── -->
    <path d="M194,406 Q256,460 318,406"
          stroke="#1e4d0e" stroke-width="14"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ── Nostril dots ───────────────────────── -->
    <circle cx="233" cy="308" r="9" fill="#1e4d0e" opacity="0.7"/>
    <circle cx="279" cy="308" r="9" fill="#1e4d0e" opacity="0.7"/>
  </g>
</svg>
