<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Body / eye-bump gradient -->
    <radialGradient id="bodyG" cx="42%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#88d98a"/>
      <stop offset="50%"  stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#3a7a3e"/>
    </radialGradient>
    <!-- Belly gradient -->
    <radialGradient id="bellyG" cx="50%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#f6f5c8"/>
      <stop offset="100%" stop-color="#d8d584"/>
    </radialGradient>
    <!-- Pupil gradient -->
    <radialGradient id="pupilG" cx="38%" cy="32%" r="60%">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <!-- Toe gradient -->
    <radialGradient id="toeG" cx="40%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#fbbf5e"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <!-- Subtle top rim light on body -->
    <linearGradient id="rimG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.16"/>
      <stop offset="60%"  stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="bg"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#000"/>

  <g clip-path="url(#bg)">

    <!-- ── Dark outline layer (gives 1-2px border effect) ── -->
    <ellipse cx="256" cy="314" rx="204" ry="163" fill="#2D5A1A"/>
    <circle  cx="172" cy="158" r="97"            fill="#2D5A1A"/>
    <circle  cx="340" cy="158" r="97"            fill="#2D5A1A"/>

    <!-- ── Body + eye bumps (bright green) ── -->
    <ellipse cx="256" cy="308" rx="186" ry="145" fill="url(#bodyG)" filter="url(#sh)"/>
    <circle  cx="172" cy="152" r="82"            fill="url(#bodyG)"/>
    <circle  cx="340" cy="152" r="82"            fill="url(#bodyG)"/>

    <!-- ── Cream belly ── -->
    <ellipse cx="256" cy="368" rx="96" ry="68"   fill="url(#bellyG)"/>

    <!-- ── Orange webbed feet — 3 toe bumps each side ── -->
    <!-- Left foot -->
    <circle cx="100" cy="453" r="34" fill="url(#toeG)"/>
    <circle cx="148" cy="438" r="34" fill="url(#toeG)"/>
    <circle cx="196" cy="453" r="34" fill="url(#toeG)"/>
    <!-- Right foot -->
    <circle cx="316" cy="453" r="34" fill="url(#toeG)"/>
    <circle cx="364" cy="438" r="34" fill="url(#toeG)"/>
    <circle cx="412" cy="453" r="34" fill="url(#toeG)"/>

    <!-- ── Large kawaii eyes ── -->
    <circle cx="172" cy="150" r="70" fill="url(#pupilG)"/>
    <circle cx="340" cy="150" r="70" fill="url(#pupilG)"/>
    <!-- White shine — large + offset secondary -->
    <circle cx="198" cy="116" r="26" fill="#fff"/>
    <circle cx="366" cy="116" r="26" fill="#fff"/>
    <circle cx="148" cy="138" r="13" fill="#fff" opacity="0.55"/>
    <circle cx="316" cy="138" r="13" fill="#fff" opacity="0.55"/>

    <!-- ── Pink blush cheeks ── -->
    <circle cx="106" cy="285" r="50" fill="rgba(255,140,160,0.72)"/>
    <circle cx="406" cy="285" r="50" fill="rgba(255,140,160,0.72)"/>

    <!-- ── Tiny nostrils ── -->
    <circle cx="238" cy="243" r="14" fill="rgba(0,0,0,0.22)"/>
    <circle cx="274" cy="243" r="14" fill="rgba(0,0,0,0.22)"/>

    <!-- ── Rim highlight across body ── -->
    <ellipse cx="256" cy="308" rx="186" ry="145" fill="url(#rimG)"/>

    <!-- ── Smile (kawaii medium-happy) ── -->
    <path d="M184,298 Q256,358 328,298"
          stroke="#2D5A1A" stroke-width="16"
          fill="none" stroke-linecap="round"/>

  </g>
</svg>
