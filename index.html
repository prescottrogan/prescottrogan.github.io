<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Froggy</title>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('froggy-theme')||'light')})();</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --surface-2: #f0f0f2;
    --border: #e5e5e7;
    --border-light: #d1d1d6;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --accent3: #f59e0b;
    --accent4: #a78bfa;
    --accent5: #22d3ee;
    --text: #171717;
    --text-2: #404040;
    --muted: #6b7280;
    --danger: #ef4444;
    --header-bg: rgba(247,247,248,.92);
    --nav-bg: rgba(255,255,255,.95);
    --r: 14px;
  }
  [data-theme="dark"] {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface-2: #1f1f1f;
    --border: #262626;
    --border-light: #333;
    --text: #f5f5f5;
    --text-2: #d4d4d4;
    --muted: #737373;
    --header-bg: rgba(10,10,10,.88);
    --nav-bg: rgba(22,22,22,.92);
  }

  html, body { height: 100%; }
  html { overflow-y: scroll; } /* always show scrollbar track — prevents layout shift on tab switch */
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 0 88px;
    min-height: 100vh;
  }
  svg { display: block; }
  button { font-family: inherit; }

  #loading-bar {
    position: fixed; top: 0; left: 0;
    height: 2px; width: 0%;
    background: var(--accent);
    transition: width .25s ease, opacity .3s ease;
    z-index: 9999; opacity: 0;
  }
  #toast {
    position: fixed; top: 16px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface-2); border: 1px solid var(--border-light);
    color: var(--text); padding: 10px 16px; border-radius: 8px;
    font-size: .85rem; z-index: 9000; transition: transform .25s ease;
    max-width: 90%; box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { border-color: var(--danger); color: var(--danger); }
  #toast.ok    { border-color: var(--accent); }

  /* ── Auth ──────────────────────────────────────── */
  #auth-screen {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 24px;
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 28px; width: 100%; max-width: 380px;
  }
  .auth-logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 28px; }
  .auth-brand { font-size: 1.7rem; font-weight: 800; letter-spacing: -.05em; color: var(--text); }
  .auth-sub  { color: var(--muted); font-size: .85rem; margin-top: 2px; }
  .auth-input {
    display: block; width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 12px 14px; font-size: 1rem;
    margin-bottom: 10px; outline: none; transition: border-color .15s; font-family: inherit;
  }
  .auth-input:focus { border-color: var(--accent); }
  .auth-btns { display: flex; gap: 8px; margin-top: 6px; }
  #auth-msg  { font-size: .85rem; margin-top: 12px; line-height: 1.4; min-height: 18px; }

  /* ── Header ────────────────────────────────────── */
  header {
    position: sticky; top: 0;
    background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 50;
  }
  .logo-mark {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 5px 10px; margin: -5px -10px; border-radius: 12px;
    transition: background .18s ease, transform .18s ease;
    user-select: none;
  }
  .logo-mark:hover { background: rgba(74,222,128,.13); transform: scale(1.05); }
  .logo-mark:active { transform: scale(.96); }
  .logo-mark span { font-size: 1.05rem; font-weight: 800; letter-spacing: -.04em; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  #date-display { color: var(--muted); font-size: .78rem; }
  .signout-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); padding: 5px 10px; font-size: .75rem; cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .signout-btn:hover { border-color: var(--danger); color: var(--danger); }
  .theme-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); padding: 5px; cursor: pointer; line-height: 0;
    transition: border-color .15s, color .15s; display: flex; align-items: center;
  }
  .theme-btn:hover { border-color: var(--border-light); color: var(--text); }

  /* ── Nav ───────────────────────────────────────── */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; max-width: 640px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: var(--nav-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    background: none; border: none; color: var(--muted);
    padding: 10px 4px 8px; cursor: pointer; font-size: .66rem; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color .15s; position: relative;
  }
  nav button:hover:not(.active) { color: var(--text-2); }
  nav button svg { width: 22px; height: 22px; stroke-width: 2; transition: transform .15s ease; }
  nav button:hover svg { transform: scale(1.15) translateY(-1px); }
  nav button.active::after {
    content: ''; position: absolute; bottom: 6px; width: 16px; height: 3px;
    border-radius: 2px; background: currentColor; opacity: .6;
  }
  nav button.active[data-tab="food"]    { color: var(--accent); }
  nav button.active[data-tab="workout"] { color: var(--accent2); }
  nav button.active[data-tab="info"]    { color: var(--accent3); }
  nav button.active[data-tab="daily"]   { color: var(--accent4); }
  nav button.active[data-tab="summary"] { color: var(--accent5); }

  /* ── Sections ──────────────────────────────────── */
  .section { display: none; padding: 16px 20px; }
  .section.active { display: block; animation: fadeIn .22s cubic-bezier(.22,1,.36,1); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* ── Cards ─────────────────────────────────────── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
    transition: box-shadow .2s ease, transform .2s ease, border-color .2s ease;
  }
  [data-theme="dark"] .card { box-shadow: none; }
  .card:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.09); border-color: var(--border-light); }
  [data-theme="dark"] .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.45); }

  /* ── Stat ──────────────────────────────────────── */
  .stat-big { text-align: center; padding: 26px 16px; }
  .stat-big .number { font-size: 3.8rem; font-weight: 800; line-height: 1; letter-spacing: -.04em; font-variant-numeric: tabular-nums; }
  .stat-big .label  { color: var(--muted); font-size: .82rem; margin-top: 8px; font-weight: 500; }
  .goal-bar      { height: 8px; background: var(--border); border-radius: 4px; margin-top: 16px; overflow: hidden; }
  .goal-bar-fill { height: 100%; border-radius: 4px; transition: width .4s cubic-bezier(.4,0,.2,1), background .25s ease; }
  .goal-text     { font-size: .76rem; color: var(--muted); margin-top: 10px; }

  /* ── Forms ─────────────────────────────────────── */
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-row input, .form-row select,
  input[type="text"], input[type="number"], input[type="date"], textarea, select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: .95rem; outline: none;
    transition: border-color .15s; font-family: inherit; width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,222,128,.13); }
  .form-row input { flex: 1; min-width: 0; }
  .form-row input.narrow { flex: 0 0 76px; }
  .form-row input.medium { flex: 0 0 96px; }
  .wk-type-row { display:flex; gap:6px; margin-bottom:10px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
  .wk-type-row::-webkit-scrollbar { display:none; }
  .wk-type-btn { flex-shrink:0; padding:7px 13px; border-radius:20px; border:1.5px solid var(--border); background:var(--bg); color:var(--muted); font-size:.82rem; font-weight:600; cursor:pointer; transition:all .15s; }
  .wk-type-btn:hover:not(.active) { border-color:var(--accent2); color:var(--accent2); transform:scale(1.04); }
  .wk-type-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  textarea { resize: vertical; min-height: 80px; }
  input[type="text"], input[type="number"], input[type="date"] { margin-bottom: 8px; }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: .5; cursor: pointer; filter: var(--cal-icon-filter, none); }
  [data-theme="dark"] { --cal-icon-filter: invert(1); }

  /* ── Buttons ───────────────────────────────────── */
  .btn {
    border: none; border-radius: 8px; padding: 10px 16px; font-size: .9rem; font-weight: 600;
    cursor: pointer; transition: opacity .15s, transform .12s, filter .15s, box-shadow .15s; white-space: nowrap;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active:not(:disabled) { transform: scale(.96) !important; box-shadow: none !important; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn svg { width: 16px; height: 16px; }
  .btn-green  { background: var(--accent);  color: #052e16; }
  .btn-blue   { background: var(--accent2); color: #061e3a; }
  .btn-yellow { background: var(--accent3); color: #2c1903; }
  .btn-purple { background: var(--accent4); color: #1d0e3e; }
  .btn-green:not(:disabled):hover  { filter: brightness(1.09); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(74,222,128,.35); }
  .btn-blue:not(:disabled):hover   { filter: brightness(1.09); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(96,165,250,.3); }
  .btn-yellow:not(:disabled):hover { filter: brightness(1.09); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(245,158,11,.3); }
  .btn-purple:not(:disabled):hover { filter: brightness(1.09); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(167,139,250,.3); }
  .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--text-2); padding: 8px 12px; font-size: .85rem; font-weight: 500; }
  .btn-ghost:hover { border-color: var(--border-light); background: var(--surface-2); }
  .btn-full { width: 100%; margin-top: 4px; }

  .icon-btn {
    background: transparent; border: none; color: var(--muted);
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s, transform .12s;
  }
  .icon-btn svg { width: 16px; height: 16px; stroke-width: 2; }
  .icon-btn:hover { background: var(--border); color: var(--text); transform: scale(1.12); }
  .icon-btn.danger:hover { color: var(--danger); background: rgba(239,68,68,.1); transform: scale(1.12); }

  /* ── Section title ─────────────────────────────── */
  .section-title {
    font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 16px 0 8px; font-weight: 600;
  }
  .section-title:first-child { margin-top: 0; }

  /* ── Entries ───────────────────────────────────── */
  .entry {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 6px; border-bottom: 1px solid var(--border); gap: 8px;
    transition: background .15s ease; border-radius: 8px; margin: 0 -6px;
  }
  .entry:hover { background: var(--surface-2); }
  .entry:last-child  { border-bottom: none; }
  .entry:first-child { padding-top: 4px; }
  .entry-content { flex: 1; min-width: 0; }
  .entry-name { font-size: .95rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-cal  { font-weight: 700; font-size: .95rem; color: var(--accent); font-variant-numeric: tabular-nums; }
  .entry-meta { font-size: .76rem; color: var(--muted); margin-top: 3px; }
  .entry-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .workout-entry .entry-cal { color: var(--accent2); }
  .entry-editing {
    background: var(--surface-2); margin: 4px -8px; padding: 12px;
    border-radius: 8px; border-bottom: none;
  }
  .edit-actions { display: flex; gap: 8px; margin-top: 8px; }
  .edit-actions .btn { flex: 1; padding: 8px 12px; font-size: .85rem; }

  /* ── Macros ────────────────────────────────────── */
  .macros-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .macro-box  { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 8px; text-align: center; transition: transform .15s ease, box-shadow .15s ease; }
  .macro-box:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(0,0,0,.09); }
  .macro-box .val { font-size: 1.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }
  .macro-box .lbl { font-size: .7rem; color: var(--muted); margin-top: 3px; font-weight: 500; }

  /* ── Day nav ───────────────────────────────────── */
  .day-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
  [data-theme="dark"] .day-nav { box-shadow: none; }
  .day-nav-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .day-nav-date   { font-weight: 700; font-size: 1rem; }
  .nav-arrow {
    background: var(--surface-2); border: none; border-radius: 10px;
    color: var(--text); cursor: pointer; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    width: 42px; height: 42px; transition: background .12s, transform .08s;
  }
  .nav-arrow:hover { background: var(--border); }
  .nav-arrow:active { transform: scale(.88); }
  .nav-arrow svg { width: 18px; height: 18px; }
  .today-btn {
    font-size: .7rem; color: var(--accent); font-weight: 700;
    background: rgba(74,222,128,.15); border: none;
    cursor: pointer; padding: 3px 10px; border-radius: 20px;
    transition: background .12s;
  }
  .today-btn:hover { background: rgba(74,222,128,.25); }
  .goal-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .goal-row label { font-size: .8rem; color: var(--muted); flex: 1; text-align: left; }
  .goal-row input { width: 90px; margin: 0; }

  /* ── Info / Folders ────────────────────────────── */
  .folder-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .folder-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: border-color .15s, transform .15s ease, box-shadow .15s;
  }
  .folder-card:hover { border-color: var(--border-light); transform: translateX(4px); box-shadow: 0 4px 14px rgba(0,0,0,.07); }
  .folder-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .folder-icon svg { width: 18px; height: 18px; }
  .folder-info { flex: 1; min-width: 0; }
  .folder-name  { font-size: .95rem; font-weight: 600; }
  .folder-count { font-size: .76rem; color: var(--muted); margin-top: 2px; }
  .folder-actions { display: flex; gap: 4px; }
  .folder-chevron { color: var(--muted); flex-shrink: 0; }

  .folder-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .folder-back {
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-2); padding: 8px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .folder-back svg { width: 16px; height: 16px; }
  .folder-title { font-size: 1.1rem; font-weight: 700; flex: 1; }

  .info-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
    transition: transform .15s ease, box-shadow .15s, border-color .15s;
  }
  .info-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.07); border-color: var(--border-light); }
  .info-card-title {
    font-weight: 600; font-size: 1rem; margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .info-card-title span { flex: 1; }
  .info-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .info-card-body { font-size: .88rem; color: var(--text-2); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .info-card-meta { font-size: .72rem; color: var(--muted); margin-top: 8px; }

  .add-folder-row { display: flex; gap: 8px; margin-bottom: 16px; }

  /* ── Habits/Tasks ──────────────────────────────── */
  .type-toggle {
    display: flex; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px; gap: 3px; margin-bottom: 10px;
  }
  .type-btn {
    flex: 1; background: transparent; border: none; border-radius: 6px;
    color: var(--muted); padding: 7px 12px; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: background .15s, color .15s;
  }
  .type-btn.active { background: var(--surface-2); color: var(--text); }

  .habit-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 6px; border-bottom: 1px solid var(--border);
    transition: background .15s ease; border-radius: 8px; margin: 0 -6px;
  }
  .habit-row:hover { background: var(--surface-2); }
  .habit-row:last-child  { border-bottom: none; }
  .habit-row:first-child { padding-top: 4px; }
  .habit-row.done-row .habit-name { text-decoration: line-through; color: var(--muted); }

  .habit-check {
    width: 26px; height: 26px; border: 2px solid var(--border-light); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .18s cubic-bezier(.34,1.56,.64,1);
  }
  .habit-check:hover { transform: scale(1.15); border-color: var(--accent4); }
  .habit-check.round  { border-radius: 50%; }
  .habit-check.square { border-radius: 5px; }
  .habit-check svg { width: 14px; height: 14px; stroke-width: 3; opacity: 0; transition: opacity .15s; }
  .habit-check.done { color: #fff; }
  .habit-check.round.done  { background: var(--accent4); border-color: var(--accent4); }
  .habit-check.square.done { background: var(--accent3); border-color: var(--accent3); }
  .habit-check.done svg { opacity: 1; }

  .habit-name { flex: 1; font-size: .95rem; font-weight: 500; }
  .habit-badge {
    font-size: .65rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  }
  .badge-habit { background: rgba(167,139,250,.12); color: var(--accent4); }
  .badge-task  { background: rgba(245,158,11,.12);  color: var(--accent3); }

  .list-divider {
    font-size: .68rem; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); font-weight: 600; padding: 8px 0 4px;
    border-bottom: 1px solid var(--border); margin-bottom: 0;
  }
  .list-divider:not(:first-child) { margin-top: 4px; }

  /* ── Misc ──────────────────────────────────────── */
  .chip { display: inline-flex; align-items: center; background: var(--border); border-radius: 4px; padding: 2px 8px; font-size: .72rem; color: var(--text-2); }
  .empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: .9rem; }
  .text-link { color: var(--accent2); background: none; border: none; cursor: pointer; font-size: .8rem; padding: 0; margin-left: 6px; }

  /* ── Food search dropdown ───────────────────────── */
  #food-dropdown { background: var(--surface); border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; margin: -4px 0 8px; box-shadow: 0 4px 16px rgba(0,0,0,.07); }
  [data-theme="dark"] #food-dropdown { box-shadow: 0 4px 16px rgba(0,0,0,.35); }
  .fd-item { padding: 10px 14px; font-size: .88rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); transition: background .1s; }
  .fd-item:last-child { border-bottom: none; }
  .fd-item:not(.fd-msg) { transition: background .1s, padding-left .12s; }
  .fd-item:not(.fd-msg):hover { background: var(--surface-2); padding-left: 18px; }
  .fd-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .fd-meta { font-size: .75rem; color: var(--muted); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .fd-msg { color: var(--muted); cursor: default; font-size: .84rem; }
  .fd-portion { display: flex; align-items: center; gap: 8px; margin: -4px 0 8px; padding: 8px 12px; background: var(--surface-2); border-radius: 8px; font-size: .85rem; color: var(--muted); }
  .fd-portion input { width: 72px; padding: 6px 10px; }
  .food-name-row { display:flex; gap:8px; margin-bottom:10px; align-items:flex-start; }
  .food-name-row input { flex:1; margin-bottom:0; }
  .food-search-btn { flex-shrink:0; padding:9px 13px; }
  .cal-input-wrap { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .cal-big-input { flex:1; font-size:1.5rem !important; font-weight:700; text-align:center; padding:12px !important; margin-bottom:0 !important; }
  .cal-unit { color:var(--muted); font-size:.9rem; font-weight:600; flex-shrink:0; }
  .cal-chips { display:flex; gap:6px; margin-bottom:10px; }
  .cal-chip { flex:1; padding:8px 4px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg); color:var(--text); font-size:.83rem; font-weight:600; cursor:pointer; transition:background .1s,color .1s,border-color .1s; }
  .cal-chip:hover { background:var(--accent); color:#052e16; border-color:var(--accent); }

  /* ── Summary ───────────────────────────────────────── */
  .smry-period { display: flex; gap: 5px; margin-bottom: 16px; }
  .smry-period-btn { flex: 1; padding: 8px 2px; border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--muted); font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .smry-period-btn.active { border-color: var(--text); background: var(--text); color: var(--bg); }
  .smry-ttl { font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
  .smry-stat-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .smry-big { font-size: 2.2rem; font-weight: 700; letter-spacing: -.03em; font-variant-numeric: tabular-nums; line-height: 1; }
  .smry-lbl { font-size: .82rem; color: var(--muted); }
  .smry-sub { font-size: .78rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .summary-bar { height: 5px; background: var(--border); border-radius: 3px; margin: 8px 0; overflow: hidden; }
  .summary-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
  .smry-macros { display: flex; gap: 8px; margin-top: 10px; }
  .smry-mac { flex: 1; background: var(--surface-2); border-radius: 8px; padding: 8px 10px; }
  .smry-mac-val { font-size: 1.15rem; font-weight: 700; line-height: 1; }
  .smry-mac-lbl { font-size: .7rem; color: var(--muted); margin-top: 3px; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 8px; }
  .week-day-col { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 0; overflow: hidden; }
  .task-due { font-size: .72rem; font-weight: 600; color: var(--accent3); margin-top: 2px; }
  .task-due.overdue { color: var(--danger); }
  #task-due-row { display: none; margin-bottom: 10px; }
  .due-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .due-chip { padding:6px 13px; border-radius:20px; border:1.5px solid var(--border); background:var(--bg); color:var(--muted); font-size:.8rem; font-weight:600; cursor:pointer; transition:all .15s; flex-shrink:0; }
  .due-chip.active { background:var(--accent4); color:#fff; border-color:var(--accent4); }
  .due-chip:hover:not(.active) { border-color:var(--accent4); color:var(--accent4); }
  .week-day-lbl { font-size: .62rem; font-weight: 600; color: var(--muted); }
  .wk-today { color: var(--accent5) !important; }
  .week-cal-wrap { width: 100%; height: 42px; background: var(--border); border-radius: 3px; display: flex; align-items: flex-end; overflow: hidden; }
  .week-cal-bar { width: 100%; border-radius: 2px 2px 0 0; }
  .week-wk-dot { width: 6px; height: 6px; border-radius: 50%; }
  .week-legend { display: flex; gap: 12px; font-size: .72rem; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); align-items: center; }
  .week-legend span { display: flex; align-items: center; gap: 4px; }
  .wk-swatch { display: inline-block; width: 8px; height: 8px; flex-shrink: 0; }

  /* ── Mascot ─────────────────────────────────────── */
  @keyframes m-idle      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes m-bounce    { 0%,100%{transform:translateY(0) scale(1)} 40%{transform:translateY(-9px) scale(1.06)} }
  @keyframes m-celebrate { 0%,100%{transform:rotate(-12deg) scale(1.1)} 50%{transform:rotate(12deg) scale(1.12)} }
  @keyframes confetti-fall { to { transform:translateY(110vh) rotate(720deg); opacity:0; } }
  @keyframes cal-pulse   { 0%,100%{opacity:1} 50%{opacity:.5} }
  .mascot-idle      { animation:m-idle 2.8s ease-in-out infinite; display:inline-block; }
  .mascot-bounce    { animation:m-bounce 1.1s ease-in-out infinite; display:inline-block; }
  .mascot-celebrate { animation:m-celebrate .44s ease-in-out infinite; display:inline-block; }
  .mascot-card  { text-align:center; padding:28px 16px 20px; }
  .mascot-pct   { font-size:3.2rem; font-weight:800; color:var(--accent4); letter-spacing:-.04em; margin-top:8px; font-variant-numeric:tabular-nums; }
  .mascot-lbl   { font-size:.82rem; color:var(--muted); margin-top:4px; font-weight:500; }
  .mascot-msg   { font-size:.88rem; color:var(--text-2); margin-top:12px; font-weight:500; min-height:1.3em; }
  #mascot-hdr   { line-height:0; cursor:pointer; }
</style>
</head>
<body>

<div id="loading-bar"></div>
<div id="toast"></div>

<!-- ══ MAIN APP ══════════════════════════════════════ -->
<div id="app" style="display:none">

  <header>
    <div class="logo-mark" onclick="switchTab('summary')" title="Home">
      <span id="mascot-hdr" class="mascot-idle"></span>
      <span>Froggy</span>
    </div>
    <div class="header-right">
      <span id="date-display"></span>
      <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <!-- ── FOOD ──────────────────────────────────────── -->
  <div id="section-food" class="section">
    <div class="day-nav">
      <button class="nav-arrow" onclick="changeDay('food',-1)" id="food-prev"></button>
      <div class="day-nav-center">
        <span class="day-nav-date" id="food-day-label"></span>
        <button class="today-btn" id="food-today-btn" onclick="goToday('food')">Today</button>
      </div>
      <button class="nav-arrow" onclick="changeDay('food',1)" id="food-next"></button>
    </div>
    <div class="card stat-big">
      <div class="number" id="cal-total" style="color:var(--accent)">0</div>
      <div class="label" id="cal-day-label">calories today</div>
      <div class="goal-bar"><div class="goal-bar-fill" id="cal-bar" style="width:0%;background:var(--accent)"></div></div>
      <div class="goal-text">
        Goal: <span id="cal-goal-display">2000</span> kcal
        <button class="text-link" onclick="toggleGoalEdit()">edit</button>
      </div>
      <div id="cal-goal-edit" style="display:none" class="goal-row">
        <label>Daily calorie goal</label>
        <input type="number" id="cal-goal-input" placeholder="2000">
        <button class="btn btn-green" style="padding:8px 14px" onclick="saveCalGoal()">Save</button>
      </div>
    </div>
    <div class="card" style="padding:14px 16px">
      <div class="macros-row">
        <div class="macro-box"><div class="val" id="macro-p" style="color:var(--accent2)">0g</div><div class="lbl">protein</div></div>
        <div class="macro-box"><div class="val" id="macro-c" style="color:var(--accent3)">0g</div><div class="lbl">carbs</div></div>
        <div class="macro-box"><div class="val" id="macro-f" style="color:var(--danger)">0g</div><div class="lbl">fat</div></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Add Food</div>
      <div class="food-name-row">
        <input type="text" id="food-name" placeholder="What did you eat?" autocomplete="off" oninput="onFoodInput()" onkeydown="if(event.key==='Enter')triggerFoodSearch()">
        <button class="btn btn-ghost food-search-btn" id="food-search-btn" onclick="triggerFoodSearch()"><span id="food-search-icon"></span></button>
      </div>
      <div id="food-dropdown" style="display:none"></div>
      <div id="food-portion-row" class="fd-portion" style="display:none">
        <span>Portion:</span>
        <input type="number" id="food-grams" value="100" min="1" inputmode="decimal" oninput="onPortionChange()">
        <span id="food-portion-suffix">g · macros auto-scaled</span>
      </div>
      <input type="number" id="food-cal" placeholder="Calories (kcal)" min="0" inputmode="numeric">
      <div class="form-row">
        <input type="number" id="food-protein" placeholder="Protein g" min="0" inputmode="numeric">
        <input type="number" id="food-carbs"   placeholder="Carbs g"   min="0" inputmode="numeric">
        <input type="number" id="food-fat"     placeholder="Fat g"     min="0" inputmode="numeric">
      </div>
      <button id="food-add-btn" class="btn btn-green btn-full" onclick="addFood()"><span id="food-plus"></span>Add</button>
    </div>
    <div class="section-title" id="food-log-title">Today's Log</div>
    <div class="card" id="food-list"><div class="empty">Nothing logged yet</div></div>
  </div>

  <!-- ── WORKOUT ────────────────────────────────────── -->
  <div id="section-workout" class="section">

      <button class="nav-arrow" onclick="changeDay('workout',-1)" id="workout-prev"></button>

        <input type="number" id="workout-goal-input" placeholder="3" min="1" max="7">

        <input type="text" id="ex-name" placeholder="Exercise name (e.g. Bench Press)">

      <div class="type-toggle">

        <button class="type-btn"        id="type-task-btn"  onclick="setAddType('task')">Task (one-time)</button>
      </div>
      <div class="form-row">
        <input type="text" id="habit-name" placeholder="Name..." style="flex:1">
        <button id="habit-add-btn" class="btn btn-purple" onclick="addItem()"><span id="habit-plus"></span>Add</button>
      </div>
      <div id="task-due-row">
        <div class="due-chips">
          <button class="due-chip" onclick="setDuePreset(this,'today')">Today</button>
          <button class="due-chip" onclick="setDuePreset(this,'tomorrow')">Tomorrow</button>
          <button class="due-chip" onclick="setDuePreset(this,'+3')">In 3 days</button>
          <button class="due-chip" onclick="setDuePreset(this,'+7')">Next week</button>
          <button class="due-chip" onclick="setDuePreset(this,'custom')">Pick date…</button>
        </div>
        <input type="date" id="task-due" style="display:none">
      </div>
    </div>
    <div id="daily-list"></div>
  </div>

  <!-- ── SUMMARY ────────────────────────────────────── -->
  <div id="section-summary" class="section active">
    <div class="card mascot-card">
      <div id="mascot-face" class="mascot-idle"></div>
      <div class="mascot-msg" id="mascot-msg">Loading…</div>
    </div>
    <div class="smry-period">
      <button class="smry-period-btn" id="sp-day"   onclick="setSummaryPeriod('day')">Day</button>
      <button class="smry-period-btn active" id="sp-week"  onclick="setSummaryPeriod('week')">Week</button>
      <button class="smry-period-btn" id="sp-month" onclick="setSummaryPeriod('month')">Month</button>
      <button class="smry-period-btn" id="sp-year"  onclick="setSummaryPeriod('year')">Year</button>
    </div>
    <div id="summary-view"></div>
  </div>

  <nav>
    <button data-tab="food"    onclick="switchTab('food')"    id="nav-food"></button>
    <button data-tab="workout" onclick="switchTab('workout')" id="nav-workout"></button>
    <button data-tab="daily"   onclick="switchTab('daily')"   id="nav-daily"></button>
    <button data-tab="info"    onclick="switchTab('info')"    id="nav-info"></button>
  </nav>
</div>

// ── Auth ───────────────────────────────────────────────────────────────────
async function init() {
  injectIcons();
  document.addEventListener('click', e => {
    if (!e.target.closest('#food-dropdown') && !e.target.closest('#food-search-btn') && e.target.id !== 'food-name') hideFoodDropdown();
  });
  const { data: { session } } = await db.auth.getSession();
  if (session?.user) { user = session.user; await showApp(); } else showAuth();

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT' || !session) { user = null; showAuth(); }
    else if (event === 'SIGNED_IN' && (!user || user.id !== session.user.id)) { user = session.user; await showApp(); }
    else if (event === 'TOKEN_REFRESHED') { user = session.user; }
  });

  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState !== 'visible' || !user) return;
    const { data: { session }, error } = await db.auth.getSession();
    if (error || !session) { toast('Session expired — please sign in.', 'error'); user = null; showAuth(); return; }
    if ((session.expires_at * 1000) - Date.now() < 5 * 60 * 1000) await db.auth.refreshSession();
  });

  setInterval(async () => {
    if (!user) return;
    const { data: { session } } = await db.auth.getSession();
    if (session && (session.expires_at * 1000 - Date.now()) < 15 * 60 * 1000) await db.auth.refreshSession();
  }, 10 * 60 * 1000);
}

  const email = document.getElementById('auth-email').value.trim();

  if (!email || !pass) return setAuthMsg('Enter your email and password.', true);
  setLoading(true);
  const { error } = await db.auth.signInWithPassword({ email, password: pass });

  if (error) setAuthMsg(error.message, true);

  if (error) setAuthMsg(error.message, true);

}

function setAuthMsg(m, e=false) { const el = document.getElementById('auth-msg'); el.textContent = m; el.style.color = e ? 'var(--danger)' : 'var(--accent)'; }
function showAuth() { document.getElementById('app').style.display = 'none'; document.getElementById('auth-screen').style.display = 'flex'; }

// ── DB wrapper ─────────────────────────────────────────────────────────────
async function dbCall(builder) {
  let r = await builder();
  if (r.error && /JWT|expired|Invalid|401|403/i.test(r.error.message || '')) {
    const { data, error } = await db.auth.refreshSession();
    if (error || !data.session) { toast('Session expired — sign in again.', 'error'); showAuth(); return r; }
    r = await builder();
  }
  if (r.error) toast(r.error.message, 'error');
  return r;
}

const USDA_KEY = 'zTrnEFEmXaZRz9X2SITx61IykQVuGy7Q56bohHWH';
let _foodSearchTimer      = null;
let _foodSearchController = null;
let _foodSearchResults    = [];
let _selectedFoodBase     = null;

function onFoodInput() {
  _selectedFoodBase = null;
  document.getElementById('food-portion-row').style.display = 'none';
  clearTimeout(_foodSearchTimer);
  hideFoodDropdown();
}

function triggerFoodSearch() {
  const q = document.getElementById('food-name').value.trim();
  if (q.length < 2) return;
  searchFoodUSDA(q);
}

function addCal(n) {
  const el = document.getElementById('food-cal');
  el.value = (parseInt(el.value) || 0) + n;

async function searchFoodUSDA(query) {
  if (_foodSearchController) _foodSearchController.abort();
  _foodSearchController = new AbortController();

  const dd = document.getElementById('food-dropdown');
  dd.innerHTML = '<div class="fd-item fd-msg">Searching…</div>';
  dd.style.display = 'block';
  try {
    // Try curated USDA datasets first (no branded duplicates), fall back to all
    let foods = [];
    for (const dt of ['Foundation,SR%20Legacy', null]) {
      const url = `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(query)}&pageSize=5${dt ? '&dataType=' + dt : ''}&api_key=${USDA_KEY}`;
      const r = await fetch(url, { signal: _foodSearchController.signal });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      foods = json.foods || [];
      if (foods.length) break;
    }
    _foodSearchResults = foods;
    if (!foods.length) {
      dd.innerHTML = '<div class="fd-item fd-msg">No results — enter calories manually</div>';
      return;
    }
    dd.innerHTML = foods.map((f, i) => {
      const nuts = f.foodNutrients || [];
      const nut  = (fid, num) => nuts.find(n => n.nutrientId === fid || String(n.nutrientNumber) === num)?.value || 0;
      const kcal = nut(1008, '208') || (nut(1062, '268') / 4.184);
      const cal  = Math.round(kcal);
      const isBranded = !!f.servingSize;
      const calLabel = cal ? (isBranded ? `${cal} kcal/serving` : `${cal} kcal/100g`) : 'tap to select';
      const desc = f.description.length > 52 ? f.description.slice(0, 52) + '…' : f.description;
      return `<div class="fd-item" onclick="selectFood(${i})">
        <span class="fd-name">${esc(desc)}</span>
        <span class="fd-meta">${calLabel}</span>
      </div>`;
    }).join('');
  } catch(e) {
    if (e.name === 'AbortError') return;
    dd.innerHTML = '<div class="fd-item fd-msg">Search unavailable — enter manually</div>';
  }
}

function selectFood(idx) {
  const f = _foodSearchResults[idx];
  if (!f) return;
  const nuts = f.foodNutrients || [];
  const nut  = (fid, num) => nuts.find(n => n.nutrientId === fid || String(n.nutrientNumber) === num)?.value || 0;

  // Branded foods store nutrients per serving size, not per 100g — normalize to per-100g base
  // Treat absent unit as grams (USDA branded items almost always use grams)
  const isGrams = u => !u || /^(g|gr|grm|gram)/i.test(u.trim());
  const servGrams = (f.servingSize > 0 && isGrams(f.servingSizeUnit)) ? f.servingSize : null;
  const scale = servGrams ? (100 / servGrams) : 1;

  const rawKcal = nut(1008, '208') || (nut(1062, '268') / 4.184);
  _selectedFoodBase = {
    cal:  rawKcal          * scale,
    pro:  nut(1003, '203') * scale,
    carb: nut(1005, '205') * scale,
    fat:  nut(1004, '204') * scale,
  };

  document.getElementById('food-name').value = f.description.split(',')[0].trim();
  hideFoodDropdown();
  document.getElementById('food-portion-row').style.display = 'flex';
  const defaultG = servGrams ? Math.round(servGrams) : 100;
  document.getElementById('food-grams').value = defaultG;
  const householdDesc = f.householdServingFullText ? ` · 1 serving = ${f.householdServingFullText}` : (servGrams ? ` · 1 serving = ${Math.round(servGrams)}g` : '');
  document.getElementById('food-portion-suffix').textContent = `g${householdDesc || ' · macros auto-scaled'}`;
  applyFoodPortion(defaultG);
  document.getElementById('food-grams').select();
}

function applyFoodPortion(g) {
  if (!_selectedFoodBase) return;
  const s = g / 100;
  document.getElementById('food-cal').value     = Math.round(_selectedFoodBase.cal  * s) || '';
  document.getElementById('food-protein').value = +(_selectedFoodBase.pro  * s).toFixed(1) || '';
  document.getElementById('food-carbs').value   = +(_selectedFoodBase.carb * s).toFixed(1) || '';
  document.getElementById('food-fat').value     = +(_selectedFoodBase.fat  * s).toFixed(1) || '';
}

function onPortionChange() {
  applyFoodPortion(parseFloat(document.getElementById('food-grams').value) || 0);
}

function hideFoodDropdown() {
  const dd = document.getElementById('food-dropdown');
  if (dd) { dd.style.display = 'none'; dd.innerHTML = ''; }
  _foodSearchResults = [];
}

const WK_PLACEHOLDERS = {Weights:'3×10 @ 135 lbs', Cardio:'30 min · 3 miles', Bodyweight:'3×15', Stretching:'20 min', Other:'Details (optional)'};

function selectWkType(btn, typeId, detailsId) {
  btn.closest('.wk-type-row').querySelectorAll('.wk-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(typeId).value = btn.dataset.type;
  document.getElementById(detailsId).placeholder = WK_PLACEHOLDERS[btn.dataset.type] || 'Details (optional)';
}

function parseDetails(str) {
  const out = { sets:null, reps:null, weight:null, duration:null, notes:null };
  let s = str.trim();
  const sxr = s.match(/(\d+)\s*[x×X]\s*(\d+)/);
  if (sxr) { out.sets = sxr[1]; out.reps = sxr[2]; s = s.replace(sxr[0], ''); }
  const wt = s.match(/@\s*(\d+\.?\d*)\s*(lbs?|kg)?/i);
  if (wt)  { out.weight = wt[1]; s = s.replace(wt[0], ''); }
  const dur = s.match(/(\d+)\s*min/i);
  if (dur) { out.duration = dur[1]; s = s.replace(dur[0], ''); }
  const leftover = s.replace(/[·\-,\s]+/g, ' ').trim();
  if (leftover) out.notes = leftover;
  return out;
}

function buildDetails(e) {
  const parts = [];
  if (e.sets && e.reps) parts.push(`${e.sets}×${e.reps}`);
  else if (e.reps) parts.push(`${e.reps} reps`);
  if (e.weight)   parts.push(`@ ${e.weight}`);
  if (e.duration) parts.push(`${e.duration} min`);
  if (e.notes)    parts.push(e.notes);
  return parts.join(' · ');
}

  ]);
  const rows       = dayRes.data || [];

  el.innerHTML = [...rows].reverse().map(e => {
    if (editing.workout===e.id) {

        <input type="hidden" id="ew-type-${e.id}" value="${curType}">
        <div class="form-row"><input type="text" id="ew-name-${e.id}" value="${esc(e.name)}" placeholder="Exercise name"></div>
        <div class="form-row"><input type="text" id="ew-details-${e.id}" value="${buildDetails(e)}" placeholder="${WK_PLACEHOLDERS[curType]||'Details (optional)'}"></div>
        <div class="edit-actions"><button class="btn btn-blue" onclick="saveEditWorkout('${e.id}')">Save</button><button class="btn btn-ghost" onclick="cancelEditWorkout()">Cancel</button></div>
      </div>`;
    }
    let meta = e.type||'';
    if (e.sets)     meta+=` · ${e.sets} sets`;
    if (e.reps)     meta+=` × ${e.reps} reps`;
    if (e.weight)   meta+=` @ ${e.weight}`;
    if (e.duration) meta+=` · ${e.duration}min`;
    return `<div class="entry"><div class="entry-content"><div class="entry-name">${esc(e.name)}</div><div class="entry-meta">${meta}${e.notes?` · ${esc(e.notes)}`:''}</div><div class="entry-meta">${e.time||''}</div></div><div class="entry-right"><button class="icon-btn" onclick="startEditWorkout('${e.id}')">${icon(IC.edit,16)}</button><button class="icon-btn danger" onclick="deleteExercise('${e.id}')">${icon(IC.trash,16)}</button></div></div>`;
  }).join('');
}

// INFO — FOLDERS
// ══════════════════════════════════════════════════════════════════════════
async function renderInfo() {
  const view = document.getElementById('info-view');

  if (currentFolder === null) {
    await renderFolderList(view);
  } else if (currentFolder === '__all__') {
    await renderFolderContents(view, null, 'All Notes');
  } else if (currentFolder === '__uncat__') {
    await renderFolderContents(view, null, 'No Folder');
  } else {
    const folder = _folderCache.find(f => f.id === currentFolder);
    await renderFolderContents(view, currentFolder, folder?.name || 'Folder');
  }
}

async function renderFolderList(view) {
  const [foldersRes, itemsRes] = await Promise.all([
    dbCall(() => db.from('info_folders').select('*').eq('user_id', user.id).order('created_at')),
    dbCall(() => db.from('info_entries').select('id, folder_id').eq('user_id', user.id))
  ]);
  _folderCache = foldersRes.data || [];
  const allItems = itemsRes.data || [];

  // Count items per folder
  const counts = {};
  let uncatCount = 0;
  allItems.forEach(item => {
    if (item.folder_id) counts[item.folder_id] = (counts[item.folder_id] || 0) + 1;
    else uncatCount++;
  });

  let html = '';

  // Add folder row
  if (editing.folder === '__new__') {
    html += `<div class="card" style="margin-bottom:12px">
      <div class="section-title">New Folder</div>
      <div class="form-row">
        <input type="text" id="new-folder-name" placeholder="Folder name..." style="flex:1">
        <button class="btn btn-yellow" onclick="saveNewFolder()">Create</button>
      </div>
    </div>`;
  } else {
    html += `<div class="add-folder-row">
      <button class="btn btn-yellow btn-full" onclick="startNewFolder()">${icon(IC.plus,16)}New Folder</button>
    </div>`;
  }

  // All notes card
  html += `<div class="folder-list">
    <div class="folder-card" onclick="openFolder('__all__')">
      <div class="folder-icon" style="background:rgba(255,255,255,.06)">${icon(IC.grid, 18)}</div>
      <div class="folder-info"><div class="folder-name">All Notes</div><div class="folder-count">${allItems.length} item${allItems.length!==1?'s':''}</div></div>
      <div class="folder-chevron">${icon(IC.chevronR, 16)}</div>
    </div>`;

  // Folder cards
  _folderCache.forEach((f, i) => {
    const color = FOLDER_COLORS[i % FOLDER_COLORS.length];
    const count = counts[f.id] || 0;
    if (editing.folder === f.id) {
      html += `<div class="info-card" style="margin-bottom:0">
        <div class="form-row" style="margin-bottom:8px">
          <input type="text" id="ef-folder-${f.id}" value="${esc(f.name)}" style="flex:1">
        </div>
        <div class="edit-actions">
          <button class="btn btn-yellow" onclick="saveEditFolder('${f.id}')">Save</button>
          <button class="btn btn-ghost"  onclick="renderInfo()">Cancel</button>
        </div>
      </div>`;
    } else {
      html += `<div class="folder-card" onclick="openFolder('${f.id}')">
        <div class="folder-icon" style="background:${color}22;color:${color}">${icon(IC.folder, 18)}</div>
        <div class="folder-info"><div class="folder-name">${esc(f.name)}</div><div class="folder-count">${count} item${count!==1?'s':''}</div></div>
        <div class="folder-actions">
          <button class="icon-btn" onclick="event.stopPropagation();startEditFolder('${f.id}')">${icon(IC.edit,16)}</button>
          <button class="icon-btn danger" onclick="event.stopPropagation();deleteFolder('${f.id}')">${icon(IC.trash,16)}</button>
        </div>
        <div class="folder-chevron">${icon(IC.chevronR, 16)}</div>
      </div>`;
    }
  });

  // Uncategorized
  if (uncatCount > 0) {
    html += `<div class="folder-card" onclick="openFolder('__uncat__')">
      <div class="folder-icon" style="background:rgba(255,255,255,.06);color:var(--muted)">${icon(IC.folder, 18)}</div>
      <div class="folder-info"><div class="folder-name" style="color:var(--muted)">No Folder</div><div class="folder-count">${uncatCount} item${uncatCount!==1?'s':''}</div></div>
      <div class="folder-chevron">${icon(IC.chevronR, 16)}</div>
    </div>`;
  }

  html += '</div>';
  view.innerHTML = html;
}

async function renderFolderContents(view, folderId, title) {
  const isUncat = currentFolder === '__uncat__';
  const isAll   = currentFolder === '__all__';

  let query = db.from('info_entries').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
  if (isAll)   { /* no filter */ }
  else if (isUncat) { query = query.is('folder_id', null); }
  else              { query = query.eq('folder_id', folderId); }

  const { data: list } = await dbCall(() => query);
  _infoCache = list || [];

  const color = folderId ? (FOLDER_COLORS[_folderCache.findIndex(f=>f.id===folderId) % FOLDER_COLORS.length]) : null;

  let html = `<div class="folder-header">
    <button class="folder-back" onclick="backToFolders()">${icon(IC.arrowL, 16)}</button>
    ${color ? `<div style="width:28px;height:28px;border-radius:6px;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center">${icon(IC.folder,15)}</div>` : ''}
    <div class="folder-title">${esc(title)}</div>
  </div>`;

  // Add note form
  html += `<div class="card">
    <div class="section-title">Add Note</div>
    <input type="text" id="info-title" placeholder="Title...">
    <textarea id="info-body" placeholder="Content..."></textarea>`;

  if (isAll || isUncat) {
    html += `<div class="form-row" style="margin-bottom:0;margin-top:4px">
      <select id="info-folder-sel" style="flex:1;padding:10px 8px;font-size:.9rem">
        <option value="">No folder</option>
        ${_folderCache.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('')}
      </select>
      <button id="info-add-btn" class="btn btn-yellow" onclick="addInfo()">${icon(IC.plus,16)}Save</button>
    </div>`;
  } else {
    html += `<button id="info-add-btn" class="btn btn-yellow btn-full" style="margin-top:8px" onclick="addInfo()">${icon(IC.plus,16)}Save</button>`;
  }
  html += `</div>`;

  if (!_infoCache.length) {
    html += '<div class="empty">Nothing here yet</div>';
  } else {
    html += _infoCache.map(e => {
      if (editing.info === e.id) {
        const folderSel = `<select id="ei-folder-${e.id}" style="width:100%;margin-bottom:8px;padding:10px 12px;font-size:.9rem">
          <option value="">No folder</option>
          ${_folderCache.map(f=>`<option value="${f.id}" ${f.id===e.folder_id?'selected':''}>${esc(f.name)}</option>`).join('')}
        </select>`;
        return `<div class="info-card" style="background:var(--surface-2)">
          <input type="text" id="ei-title-${e.id}" value="${esc(e.title)}" style="margin-bottom:8px">
          <textarea id="ei-body-${e.id}" style="margin-bottom:8px">${esc(e.body||'')}</textarea>
          ${folderSel}
          <div class="edit-actions">
            <button class="btn btn-yellow" onclick="saveEditInfo('${e.id}')">Save</button>
            <button class="btn btn-ghost"  onclick="cancelEditInfo()">Cancel</button>
          </div>
        </div>`;
      }
      const folderName = _folderCache.find(f=>f.id===e.folder_id)?.name;
      return `<div class="info-card">
        <div class="info-card-title">
          <span>${esc(e.title)}</span>
          <div class="info-card-actions">
            <button class="icon-btn" onclick="startEditInfo('${e.id}')">${icon(IC.edit,16)}</button>
            <button class="icon-btn danger" onclick="deleteInfo('${e.id}')">${icon(IC.trash,16)}</button>
          </div>
        </div>
        ${e.body ? `<div class="info-card-body">${esc(e.body)}</div>` : ''}
        <div class="info-card-meta">
          ${new Date(e.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
          ${folderName ? `<span class="chip">${esc(folderName)}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  view.innerHTML = html;
}

// DAILY — HABITS + TASKS
// ══════════════════════════════════════════════════════════════════════════
function setDuePreset(btn, type) {
  document.querySelectorAll('.due-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  const due = document.getElementById('task-due');
  if (type === 'custom') { due.style.display = 'block'; due.focus(); return; }
  due.style.display = 'none';
  const d = new Date();
  if      (type === 'tomorrow') d.setDate(d.getDate() + 1);
  else if (type === '+3')       d.setDate(d.getDate() + 3);
  else if (type === '+7')       d.setDate(d.getDate() + 7);
  due.value = localDateStr(d);
}

function setAddType(type) {
  addType = type;
  document.getElementById('type-habit-btn').classList.toggle('active', type === 'habit');
  document.getElementById('type-task-btn').classList.toggle('active',  type === 'task');
  document.getElementById('habit-name').placeholder = type === 'habit'
    ? 'Habit name (e.g. Drink water, Exercise...)'
    : 'Task name (e.g. Call dentist, Buy groceries...)';
  const showDue = type === 'task';
  document.getElementById('task-due-row').style.display = showDue ? 'block' : 'none';
  if (!showDue) {
    document.getElementById('task-due').value = '';
    document.getElementById('task-due').style.display = 'none';
    document.querySelectorAll('.due-chip').forEach(c => c.classList.remove('active'));
  }
}

function parseTaskName(raw) {
  const m = (raw || '').match(/^(.*?)\s*\[(\d{4}-\d{2}-\d{2})\]$/);
  return m ? { name: m[1].trim(), due: m[2] } : { name: raw || '', due: null };
}

function formatDue(dateStr) {
  const today = todayKey();
  if (dateStr === today)        return 'today';
  if (dateStr === offsetKey(1)) return 'tomorrow';
  if (dateStr === offsetKey(-1)) return 'yesterday';
  const [y,m,d] = dateStr.split('-');
  return new Date(+y,+m-1,+d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

async function addItem() {
  const name = document.getElementById('habit-name').value.trim();
  if (!name) return flashErr('habit-name', 'Enter a name');
  const btn = document.getElementById('habit-add-btn'); btnLoad(btn, true);
  const due = addType === 'task' ? (document.getElementById('task-due').value || '') : '';
  const storedName = due ? `${name} [${due}]` : name;
  const { error } = await dbCall(() => db.from('habits').insert({
    user_id: user.id, name: storedName, recurring: addType === 'habit', completed: false
  }));
  btnLoad(btn, false); if (error) return;
  document.getElementById('habit-name').value = '';
  document.getElementById('task-due').value = '';
  document.getElementById('task-due').style.display = 'none';
  document.querySelectorAll('.due-chip').forEach(c => c.classList.remove('active'));
  await renderDaily();
}

function startEditHabit(id) { editing.habit = id; renderDaily(); }
function cancelEditHabit()  { editing.habit = null; renderDaily(); }
async function saveEditHabit(id, isRecurring) {
  let name = document.getElementById('eh-name-'+id)?.value.trim();
  if (!name) return toast('Name required','error');
  if (!isRecurring) {
    const due = document.getElementById('eh-due-'+id)?.value;
    if (due) name = `${name} [${due}]`;
  }
  const { error } = await dbCall(() => db.from('habits').update({ name }).eq('id',id).eq('user_id',user.id));
  if (error) return; editing.habit = null; toast('Updated','ok'); await renderDaily();
}

async function toggleItem(id, isRecurring) {
  if (isRecurring) {
    const dateKey = offsetKey(currentDays.daily);
    const { data } = await dbCall(() => db.from('habit_completions').select('id').eq('user_id',user.id).eq('habit_id',id).eq('date',dateKey).maybeSingle());
    if (data) await dbCall(() => db.from('habit_completions').delete().eq('id',data.id));
    else      await dbCall(() => db.from('habit_completions').insert({user_id:user.id,habit_id:id,date:dateKey}));
  } else {
    // get current completed state
    const { data } = await dbCall(() => db.from('habits').select('completed').eq('id',id).single());
    await dbCall(() => db.from('habits').update({ completed: !data?.completed }).eq('id',id).eq('user_id',user.id));
  }
  await renderDaily();
}

async function deleteItem(id) {
  await dbCall(() => db.from('habits').delete().eq('id',id).eq('user_id',user.id));
  await renderDaily();
}

async function renderDaily() {
  const dateKey  = offsetKey(currentDays.daily);
  const dayLabel = fmt(dateKey);
  document.getElementById('daily-day-label').textContent = dayLabel;
  document.getElementById('daily-today-btn').style.display = currentDays.daily === 0 ? 'none' : '';

  const [itemsRes, compRes] = await Promise.all([
    dbCall(() => db.from('habits').select('*').eq('user_id',user.id).order('created_at')),
    dbCall(() => db.from('habit_completions').select('habit_id').eq('user_id',user.id).eq('date',dateKey))
  ]);

  const all   = itemsRes.data || [];
  const doneHabitIds = new Set((compRes.data||[]).map(c=>c.habit_id));

  const habits  = all.filter(h =>  h.recurring);
  const tasks   = all.filter(h => !h.recurring);

  const doneCnt = habits.filter(h=>doneHabitIds.has(h.id)).length + tasks.filter(t=>t.completed).length;
  const pct = all.length ? Math.round((doneCnt / all.length)*100) : 0;
  document.getElementById('daily-pct').textContent = pct+'%';
  const dayWord = currentDays.daily === 0 ? 'today' : dayLabel === 'Yesterday' ? 'yesterday' : `on ${dayLabel}`;
  document.getElementById('daily-label').textContent = `${doneCnt} of ${all.length} done ${dayWord}`;
  _mascot.habitDone = doneCnt;
  _mascot.habitTotal = all.length;
  updateMascot();

  if (!all.length) {
    document.getElementById('daily-list').innerHTML = '<div class="card"><div class="empty">Add habits or tasks above</div></div>';
    return;
  }

  function renderRow(item, isDone) {
    const parsed = item.recurring ? { name: item.name, due: null } : parseTaskName(item.name);
    if (editing.habit === item.id) {
      const dueField = item.recurring ? '' : `<input type="date" id="eh-due-${item.id}" value="${parsed.due||''}">`;
      return `<div class="entry-editing">
        <input type="text" id="eh-name-${item.id}" value="${esc(parsed.name)}" style="margin-bottom:8px">
        ${dueField}
        <div class="edit-actions">
          <button class="btn btn-purple" onclick="saveEditHabit('${item.id}',${item.recurring})">Save</button>
          <button class="btn btn-ghost"  onclick="cancelEditHabit()">Cancel</button>
        </div>
      </div>`;
    }
    const shape = item.recurring ? 'round' : 'square';
    const badge = item.recurring
      ? `<span class="habit-badge badge-habit">Habit</span>`
      : `<span class="habit-badge badge-task">Task</span>`;
    let dueHtml = '';
    if (parsed.due) {
      const isOverdue = !isDone && parsed.due < todayKey();
      dueHtml = `<div class="task-due${isOverdue?' overdue':''}">due ${formatDue(parsed.due)}</div>`;
    }
    return `<div class="habit-row ${isDone?'done-row':''}">
      <button class="habit-check ${shape} ${isDone?'done':''}" onclick="toggleItem('${item.id}',${item.recurring})">${icon(IC.check,14)}</button>
      <div style="flex:1;min-width:0">
        <div class="habit-name">${esc(parsed.name)}</div>
        ${dueHtml}
      </div>
      ${badge}
      <button class="icon-btn" onclick="startEditHabit('${item.id}')">${icon(IC.edit,16)}</button>
      <button class="icon-btn danger" onclick="deleteItem('${item.id}')">${icon(IC.trash,16)}</button>
    </div>`;
  }

  let html = '';

  // Incomplete habits
  const incompleteHabits = habits.filter(h => !doneHabitIds.has(h.id));
  const completedHabits  = habits.filter(h =>  doneHabitIds.has(h.id));
  const incompleteTasks  = tasks.filter(t => !t.completed);
  const completedTasks   = tasks.filter(t =>  t.completed);

  const hasHabits = habits.length > 0;
  const hasTasks  = tasks.length  > 0;

  // Open card
  if (incompleteHabits.length || incompleteTasks.length) {
    html += '<div class="card">';
    if (hasHabits && hasTasks && incompleteHabits.length) {
      html += `<div class="list-divider">Habits</div>`;
    }
    incompleteHabits.forEach(h => { html += renderRow(h, false); });
    if (hasHabits && hasTasks && incompleteTasks.length) {
      html += `<div class="list-divider" style="margin-top:8px">Tasks</div>`;
    }
    incompleteTasks.forEach(t => { html += renderRow(t, false); });
    html += '</div>';
  }

  // Done card
  const doneItems = [...completedHabits, ...completedTasks];
  if (doneItems.length) {
    html += '<div class="card" style="opacity:.65">';
    html += `<div class="list-divider" style="margin-bottom:4px">Done</div>`;
    completedHabits.forEach(h => { html += renderRow(h, true); });
    completedTasks.forEach(t  => { html += renderRow(t, true); });
    html += '</div>';
  }

  document.getElementById('daily-list').innerHTML = html;
}

// SUMMARY
// ══════════════════════════════════════════════════════════════════════════
function getPeriodRange(p) {
  const end = todayKey();
  if (p === 'day') return { start: end, end, days: 1 };
  const n = { week: 6, month: 29, year: 364 }[p];
  const s = new Date(); s.setDate(s.getDate() - n);
  return { start: localDateStr(s), end, days: n + 1 };
}

function setSummaryPeriod(p) {
  summaryPeriod = p;
  ['day','week','month','year'].forEach(x => {
    const b = document.getElementById('sp-' + x);
    if (b) b.classList.toggle('active', x === p);
  });
  renderSummary();
}

async function renderSummary() {
  const view = document.getElementById('summary-view');
  if (!view) return;
  view.innerHTML = '<div class="empty">Loading…</div>';

  const { start, end, days } = getPeriodRange(summaryPeriod);
  const today   = todayKey();
  const wkStart = weekStartKey();

  const [foodRes, wkRes, habRes, compRes, wkWeekRes, todayFoodRes, todayCompRes] = await Promise.all([
    dbCall(() => db.from('food_entries').select('calories,protein,carbs,fat,date').eq('user_id',user.id).gte('date',start).lte('date',end)),
    dbCall(() => db.from('workout_entries').select('id,date,type').eq('user_id',user.id).gte('date',start).lte('date',end)),
    dbCall(() => db.from('habits').select('id,recurring,completed').eq('user_id',user.id)),
    dbCall(() => db.from('habit_completions').select('habit_id,date').eq('user_id',user.id).gte('date',start).lte('date',end)),
    dbCall(() => db.from('workout_entries').select('date').eq('user_id',user.id).gte('date',wkStart).lte('date',today)),
    dbCall(() => db.from('food_entries').select('calories').eq('user_id',user.id).eq('date',today)),
    dbCall(() => db.from('habit_completions').select('habit_id').eq('user_id',user.id).eq('date',today)),
  ]);

  const foods    = foodRes.data  || [];
  const wks      = wkRes.data    || [];
  const allItems = habRes.data   || [];
  const comps    = compRes.data  || [];
  const habits   = allItems.filter(h =>  h.recurring);
  const tasks    = allItems.filter(h => !h.recurring);

  // Today's goal data (for mascot + today card)
  const todayCals      = (todayFoodRes.data||[]).reduce((s,f)=>s+(f.calories||0),0);
  const thisWeekWk     = new Set((wkWeekRes.data||[]).map(e=>e.date)).size;
  const todayDoneIds   = new Set((todayCompRes.data||[]).map(c=>c.habit_id));
  const todayHabitDone = habits.filter(h=>todayDoneIds.has(h.id)).length + tasks.filter(t=>t.completed).length;
  const totalItems     = allItems.length;

  // Update mascot state
  _mascot.cals        = todayCals;
  _mascot.wkSessions  = thisWeekWk;
  _mascot.habitDone   = todayHabitDone;
  _mascot.habitTotal  = totalItems;
  updateMascot();

  // ── Today's Goals card
  const calPct  = calGoal ? Math.min(100, Math.round((todayCals/calGoal)*100)) : 0;
  const wkPct   = workoutGoal ? Math.min(100, Math.round((thisWeekWk/workoutGoal)*100)) : 0;
  const habPct  = totalItems ? Math.round((todayHabitDone/totalItems)*100) : 0;
  const todayCard = `<div class="card" style="margin-bottom:12px">
    <div class="smry-ttl">Today's Goals</div>
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
        <span style="font-size:.85rem;font-weight:600">🍽 Calories</span>
        <span style="font-size:.78rem;color:var(--muted)">${todayCals.toLocaleString()} / ${calGoal.toLocaleString()} kcal</span>
      </div>
      <div class="goal-bar"><div class="goal-bar-fill" style="width:${calPct}%;background:${calPct>110?'var(--danger)':'var(--accent)'}"></div></div>
    </div>
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
        <span style="font-size:.85rem;font-weight:600">💪 Workouts</span>
        <span style="font-size:.78rem;color:var(--muted)">${thisWeekWk} / ${workoutGoal} this week</span>
      </div>
      <div class="goal-bar"><div class="goal-bar-fill" style="width:${wkPct}%;background:var(--accent2)"></div></div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
        <span style="font-size:.85rem;font-weight:600">✓ Habits</span>
        <span style="font-size:.78rem;color:var(--muted)">${todayHabitDone} / ${totalItems} today</span>
      </div>
      <div class="goal-bar"><div class="goal-bar-fill" style="width:${habPct}%;background:var(--accent4)"></div></div>
    </div>
  </div>`;

  // Nutrition
  const totalCals  = foods.reduce((s,f) => s + (f.calories||0), 0);
  const totalP     = foods.reduce((s,f) => s + (+f.protein||0), 0);
  const totalC     = foods.reduce((s,f) => s + (+f.carbs||0),   0);
  const totalF     = foods.reduce((s,f) => s + (+f.fat||0),     0);
  const loggedDays = new Set(foods.map(f => f.date)).size;
  const avgCals    = loggedDays ? Math.round(totalCals / loggedDays) : 0;

  // Workouts
  const wkDaysSet = new Set(wks.map(w => w.date));
  const wkDays    = wkDaysSet.size;

  // Habits
  const compRate   = (habits.length && days) ? Math.min(100, Math.round((comps.length / (habits.length * days)) * 100)) : null;
  const tasksDone  = tasks.filter(t => t.completed).length;

  // ── Week chart (week period only)
  let chartHtml = '';
  if (summaryPeriod === 'week') {
    const calsByDay = {};
    foods.forEach(f => { calsByDay[f.date] = (calsByDay[f.date]||0) + f.calories; });
    const weekDays = Array.from({length:7}, (_,i) => {
      const d = new Date(); d.setDate(d.getDate() - (6 - i));
      return localDateStr(d);
    });
    const cols = weekDays.map(date => {
      const d = new Date(date + 'T12:00:00');
      const lbl = ['S','M','T','W','T','F','S'][d.getDay()];
      const cals = calsByDay[date] || 0;
      const barH = (cals && calGoal) ? Math.min(42, Math.max(3, Math.round((cals/calGoal)*42))) : 0;
      const barColor = cals > calGoal ? 'var(--danger)' : 'var(--accent5)';
      const hasWk = wkDaysSet.has(date);
      return `<div class="week-day-col">
        <div class="week-day-lbl${date===today?' wk-today':''}">${lbl}</div>
        <div class="week-cal-wrap"><div class="week-cal-bar" style="height:${barH}px;background:${barColor}"></div></div>
        <div class="week-wk-dot" style="background:${hasWk?'var(--accent2)':'var(--border)'}"></div>
      </div>`;
    }).join('');
    chartHtml = `<div class="card" style="margin-bottom:12px">
      <div class="smry-ttl">This Week</div>
      <div class="week-grid">${cols}</div>
      <div class="week-legend">
        <span><i class="wk-swatch" style="background:var(--accent5);border-radius:2px"></i>Calories</span>
        <span><i class="wk-swatch" style="background:var(--accent2);border-radius:50%"></i>Workout</span>
      </div>
    </div>`;
  }

  // ── Nutrition card
  const displayCals = days === 1 ? totalCals : avgCals;
  const goalPct = calGoal ? Math.min(100, Math.round((displayCals / calGoal) * 100)) : 0;
  const nutritionHtml = `<div class="card" style="margin-bottom:12px">
    <div class="smry-ttl">Nutrition</div>
    <div class="smry-stat-row">
      <span class="smry-big" style="color:var(--accent)">${displayCals.toLocaleString()}</span>
      <span class="smry-lbl">kcal${days > 1 ? ' avg / day' : ' today'}</span>
    </div>
    <div class="summary-bar"><div class="summary-bar-fill" style="width:${goalPct}%;background:${goalPct>110?'var(--danger)':'var(--accent)'}"></div></div>
    <div class="smry-sub">${goalPct}% of ${calGoal.toLocaleString()} goal${days > 1 ? ` · ${totalCals.toLocaleString()} total · ${loggedDays} of ${days} days logged` : ''}</div>
    <div class="smry-macros">
      <div class="smry-mac"><div class="smry-mac-val" style="color:var(--accent2)">${Math.round(days===1?totalP:totalP/(loggedDays||1))}g</div><div class="smry-mac-lbl">${days>1?'avg ':''}protein</div></div>
      <div class="smry-mac"><div class="smry-mac-val" style="color:var(--accent3)">${Math.round(days===1?totalC:totalC/(loggedDays||1))}g</div><div class="smry-mac-lbl">${days>1?'avg ':''}carbs</div></div>
      <div class="smry-mac"><div class="smry-mac-val" style="color:var(--danger)">${Math.round(days===1?totalF:totalF/(loggedDays||1))}g</div><div class="smry-mac-lbl">${days>1?'avg ':''}fat</div></div>
    </div>
  </div>`;

  // ── Workouts card
  const activePct  = days ? Math.round((wkDays/days)*100) : 0;
  const wkGoalPct  = workoutGoal ? Math.min(100, Math.round((wkDays/workoutGoal)*100)) : 0;
  const workoutsHtml = `<div class="card" style="margin-bottom:12px">
    <div class="smry-ttl">Workouts</div>
    <div style="display:flex;gap:20px;align-items:flex-end">
      <div><div class="smry-big" style="color:var(--accent2)">${wkDays}</div><div class="smry-sub">session${wkDays!==1?'s':''}</div></div>
      <div><div class="smry-big" style="color:var(--accent2);font-size:1.5rem">${wks.length}</div><div class="smry-sub">exercise${wks.length!==1?'s':''}</div></div>
      ${days>1 ? `<div style="margin-left:auto;text-align:right"><div style="font-size:1.3rem;font-weight:700;color:var(--text-2)">${activePct}%</div><div class="smry-sub">days active</div></div>` : ''}
    </div>
    ${summaryPeriod === 'week' && workoutGoal ? `
      <div class="summary-bar" style="margin-top:10px"><div class="summary-bar-fill" style="width:${wkGoalPct}%;background:var(--accent2)"></div></div>
      <div class="smry-sub">${wkDays} of ${workoutGoal} session goal this week${wkGoalPct>=100?' — goal met!':''}</div>
    ` : ''}
  </div>`;

  // ── Daily card
  const dailyHtml = `<div class="card">
    <div class="smry-ttl">Daily</div>
    ${habits.length ? `
      <div class="smry-stat-row">
        <span class="smry-big" style="color:var(--accent4)">${compRate ?? 0}%</span>
        <span class="smry-lbl">habit completion</span>
      </div>
      <div class="summary-bar"><div class="summary-bar-fill" style="width:${compRate??0}%;background:var(--accent4)"></div></div>
      <div class="smry-sub">${habits.length} habit${habits.length!==1?'s':''}</div>
    ` : '<div class="smry-sub">No habits tracked</div>'}
    ${tasks.length ? `<div class="smry-sub" style="margin-top:${habits.length?6:0}px">${tasksDone} of ${tasks.length} task${tasks.length!==1?'s':''} completed</div>` : ''}
  </div>`;

  view.innerHTML = todayCard + chartHtml + nutritionHtml + workoutsHtml + dailyHtml;
}

// ── Mascot (kawaii frog) ────────────────────────────────────────────────────
function mascotSVG(score, size) {
  size = size || 72;
  const s = score;
  const body    = '#66BB6A';
  const outline = '#2D5A1A';
  const bl      = s>=65?0.88:s>=40?0.5:0; // blush opacity
  // Small cute mouth (not wide — kawaii style)
  const mouth = s>=90?'M13,24 Q20,30 27,24'
              : s>=65?'M14,24 Q20,29 26,24'
              : s>=40?'M15,24.5 Q20,28 25,24.5'
              : s>=20?'M16,25.5 Q20,26.5 24,25.5'
              : s>=8 ?'M14,27 Q20,22.5 26,27'
              :        'M13,28 Q20,21 27,28';
  // Tears when very sad
  const tears = s<8
    ? '<ellipse cx="10" cy="21" rx="1.5" ry="2.5" fill="#93c5fd" opacity=".9"/>'
    + '<ellipse cx="28" cy="21" rx="1.5" ry="2.5" fill="#93c5fd" opacity=".9"/>'
    : '';
  // Gold stars when celebrating
  const stars = s>=90
    ? '<path d="M3,8 L4,5 L5,8 L8,9 L5,10 L4,13 L3,10 L0,9Z" fill="#FBBF24"/>'
    + '<path d="M35,6 L36,3 L37,6 L40,7 L37,8 L36,11 L35,8 L32,7Z" fill="#FBBF24"/>'
    : '';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
    // Dark outline layer (1-1.5px border effect)
    + '<ellipse cx="20" cy="25.5" rx="17" ry="13.5" fill="'+outline+'"/>'
    + '<circle cx="13" cy="12.5" r="8" fill="'+outline+'"/>'
    + '<circle cx="27" cy="12.5" r="8" fill="'+outline+'"/>'
    // Body + eye bumps
    + '<ellipse cx="20" cy="25" rx="15.5" ry="12" fill="'+body+'"/>'
    + '<circle cx="13" cy="12" r="6.8" fill="'+body+'"/>'
    + '<circle cx="27" cy="12" r="6.8" fill="'+body+'"/>'
    // Cream belly
    + '<ellipse cx="20" cy="30" rx="8" ry="5.5" fill="#E8E5A0"/>'
    // Orange webbed feet (3 toe bumps each)
    + '<circle cx="7" cy="37" r="2.6" fill="#F59E0B"/>'
    + '<circle cx="11" cy="35.8" r="2.6" fill="#F59E0B"/>'
    + '<circle cx="15" cy="37" r="2.6" fill="#F59E0B"/>'
    + '<circle cx="25" cy="37" r="2.6" fill="#F59E0B"/>'
    + '<circle cx="29" cy="35.8" r="2.6" fill="#F59E0B"/>'
    + '<circle cx="33" cy="37" r="2.6" fill="#F59E0B"/>'
    // Large kawaii eyes (big black circles with white shine)
    + '<circle cx="13" cy="12" r="5.8" fill="#111"/>'
    + '<circle cx="27" cy="12" r="5.8" fill="#111"/>'
    + '<circle cx="15.5" cy="9.2" r="2" fill="white"/>'
    + '<circle cx="29.5" cy="9.2" r="2" fill="white"/>'
    // Pink blush cheeks
    + '<circle cx="7.5" cy="23" r="4" fill="rgba(255,140,160,'+bl+')"/>'
    + '<circle cx="32.5" cy="23" r="4" fill="rgba(255,140,160,'+bl+')"/>'
    // Tiny nostrils
    + '<circle cx="18.5" cy="19.5" r="1.1" fill="rgba(0,0,0,0.2)"/>'
    + '<circle cx="21.5" cy="19.5" r="1.1" fill="rgba(0,0,0,0.2)"/>'
    + tears + stars
    // Mouth
    + '<path d="'+mouth+'" stroke="'+outline+'" stroke-width="1.6" fill="none" stroke-linecap="round"/>'
    + '</svg>';
}

function mascotMsg(score) {
  if (score>=95) return "All goals crushed! You're on fire! 🎉";
  if (score>=80) return "Incredible progress today!";
  if (score>=65) return "Looking great, keep it up!";
  if (score>=45) return "Good progress, you've got this!";
  if (score>=25) return "A little more effort...";
  if (score>=10) return "Let's get moving!";
  return "I'm waiting for you...";
}

function updateMascot() {
  const { cals, habitDone, habitTotal, wkSessions } = _mascot;
  const calPct = calGoal > 0 ? (cals / calGoal) * 100 : 0;
  const calS   = calPct <= 100 ? calPct : Math.max(0, 100 - (calPct - 100) * 2);
  const habS   = habitTotal > 0 ? (habitDone / habitTotal) * 100 : 0;
  const wkS    = workoutGoal > 0 ? Math.min(100, (wkSessions / workoutGoal) * 100) : 0;
  const s      = Math.round((calS + habS + wkS) / 3);
  const cls = s>=90?'mascot-celebrate':s>=55?'mascot-bounce':'mascot-idle';
  const face = document.getElementById('mascot-face');
  const msg  = document.getElementById('mascot-msg');
  const hdr  = document.getElementById('mascot-hdr');
  if (face) { face.innerHTML=mascotSVG(s,72); face.className=cls; }
  if (msg)  msg.textContent = mascotMsg(s);
  if (hdr)  { hdr.innerHTML=mascotSVG(s,34); hdr.className=cls; }
  if (s>=95 && habitTotal>0 && !_confettiFired) { _confettiFired=true; popConfetti(); }
  if (s<90) _confettiFired = false;
}

function popConfetti() {
  const cols = ['#4ade80','#60a5fa','#f59e0b','#a78bfa','#f87171','#22d3ee','#fb923c'];
  for (let i=0;i<45;i++) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;width:'+(6+Math.random()*7)+'px;height:'+(6+Math.random()*7)+'px;background:'+cols[i%cols.length]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';top:-12px;left:'+(4+Math.random()*92)+'%;z-index:9998;pointer-events:none;animation:confetti-fall '+(0.85+Math.random()*.9)+'s ease-in forwards;animation-delay:'+(Math.random()*.65)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  }
}

// ── Navigation ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  editing = { food: null, workout: null, info: null, habit: null, folder: null };
  hideFoodDropdown();
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-'+tab).classList.add('active');
  document.querySelector(`nav button[data-tab="${tab}"]`).classList.add('active');
  if (tab==='food')    renderFood();
  if (tab==='workout') renderWorkout();
  if (tab==='info')    renderInfo();
  if (tab==='daily')   renderDaily();
  if (tab==='summary') setSummaryPeriod(summaryPeriod);
}
function changeDay(s,d) {
  currentDays[s]+=d;
  if(s!=='daily' && currentDays[s]>0) currentDays[s]=0;
  if(s==='food')renderFood(); else if(s==='workout')renderWorkout(); else if(s==='daily')renderDaily();
}
function goToday(s) {
  currentDays[s]=0;
  if(s==='food')renderFood(); else if(s==='workout')renderWorkout(); else if(s==='daily')renderDaily();
}

// ── Utils ──────────────────────────────────────────────────────────────────
const localDateStr = (d = new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey     = () => localDateStr();
const offsetKey    = n => { const d = new Date(); d.setDate(d.getDate() + n); return localDateStr(d); };
const weekStartKey = () => { const d = new Date(); d.setDate(d.getDate() - (d.getDay() === 0 ? 6 : d.getDay() - 1)); return localDateStr(d); };
const fmt = key => {
  if (key===todayKey())    return 'Today';
  if (key===offsetKey(-1)) return 'Yesterday';
  const [y,m,d]=key.split('-');
  return new Date(+y,+m-1,+d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
};
function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function flashErr(id, ph) { const el=document.getElementById(id); el.style.borderColor='var(--danger)'; el.placeholder=ph; setTimeout(()=>el.style.borderColor='',1500); }
function setLoading(on) { const b=document.getElementById('loading-bar'); b.style.opacity='1'; b.style.width=on?'70%':'100%'; if(!on)setTimeout(()=>{b.style.width='0%';b.style.opacity='0';},350); }
function btnLoad(btn,on) { if(!btn)return; if(on){btn._orig=btn.innerHTML;btn.innerHTML='...';btn.disabled=true;}else{btn.innerHTML=btn._orig||btn.innerHTML;btn.disabled=false;} }
let _tt; function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;clearTimeout(_tt);_tt=setTimeout(()=>el.className=type,2200);}

init();
</script>
