<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --accent3: #f59e0b;
    --accent4: #a78bfa;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #f87171;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 0 80px;
  }

  header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
  #date-display { color: var(--muted); font-size: 0.85rem; }

  /* Tabs */
  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 640px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 100;
  }
  nav button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 12px 4px 10px;
    cursor: pointer;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }
  nav button .icon { font-size: 1.3rem; }
  nav button.active { color: var(--text); }
  nav button.active[data-tab="food"] { color: var(--accent); }
  nav button.active[data-tab="workout"] { color: var(--accent2); }
  nav button.active[data-tab="info"] { color: var(--accent3); }
  nav button.active[data-tab="daily"] { color: var(--accent4); }

  /* Sections */
  .section { display: none; padding: 20px; }
  .section.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  /* Big stat */
  .stat-big {
    text-align: center;
    padding: 20px 16px;
  }
  .stat-big .number {
    font-size: 3rem;
    font-weight: 800;
    line-height: 1;
  }
  .stat-big .label { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
  .stat-big .goal-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
  }
  .stat-big .goal-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
  }
  .goal-text { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  /* Forms */
  .form-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .form-row input, .form-row select, input[type="text"], input[type="number"], textarea, select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-row input:focus, input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
    border-color: var(--accent);
  }
  .form-row input { flex: 1; min-width: 0; }
  .form-row input.narrow { flex: 0 0 80px; }
  .form-row input.medium { flex: 0 0 100px; }
  textarea {
    width: 100%;
    resize: vertical;
    min-height: 80px;
    font-family: inherit;
  }
  input[type="text"], input[type="number"] { width: 100%; margin-bottom: 8px; }

  /* Buttons */
  .btn {
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-green { background: var(--accent); color: #000; }
  .btn-blue { background: var(--accent2); color: #000; }
  .btn-yellow { background: var(--accent3); color: #000; }
  .btn-purple { background: var(--accent4); color: #000; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; font-size: 0.8rem; }
  .btn-danger { background: transparent; border: none; color: var(--danger); padding: 4px 8px; font-size: 0.85rem; cursor: pointer; }
  .btn-full { width: 100%; margin-top: 4px; }

  /* Section headers */
  .section-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin: 16px 0 8px;
  }

  /* Food entries */
  .entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .entry:last-child { border-bottom: none; }
  .entry-name { font-size: 0.95rem; }
  .entry-cal { font-weight: 700; font-size: 0.95rem; color: var(--accent); }
  .entry-meta { font-size: 0.75rem; color: var(--muted); }
  .entry-right { display: flex; align-items: center; gap: 8px; }

  /* Workout entry */
  .workout-entry .entry-cal { color: var(--accent2); }

  /* Info cards */
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .info-card-title {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .info-card-body {
    font-size: 0.88rem;
    color: #ccc;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .info-card-date { font-size: 0.72rem; color: var(--muted); margin-top: 8px; }

  /* Daily habits */
  .habit-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .habit-row:last-child { border-bottom: none; }
  .habit-check {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 0.9rem;
  }
  .habit-check.done { background: var(--accent4); border-color: var(--accent4); }
  .habit-name { flex: 1; font-size: 0.95rem; }
  .habit-name.done { text-decoration: line-through; color: var(--muted); }
  .habit-streak { font-size: 0.75rem; color: var(--muted); }

  /* Day nav */
  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .day-nav-date { font-weight: 600; font-size: 0.95rem; }
  .day-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 12px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .today-btn {
    font-size: 0.75rem;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
  }

  /* Goal setting */
  .goal-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .goal-row label { font-size: 0.8rem; color: var(--muted); flex: 1; }
  .goal-row input { width: 80px; margin: 0; }

  /* Empty state */
  .empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.9rem; }

  /* Tag chips */
  .chip {
    display: inline-block;
    background: var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.72rem;
    color: var(--muted);
    margin-right: 4px;
  }

  /* Macros row */
  .macros-row {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin-top: 4px;
  }
  .macro-box {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .macro-box .val { font-size: 1.1rem; font-weight: 700; }
  .macro-box .lbl { font-size: 0.7rem; color: var(--muted); }

  /* History toggle */
  .hist-toggle { color: var(--accent2); background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 0; }

  /* Collapsible */
  .collapsible-body { display: none; margin-top: 10px; }
  .collapsible-body.open { display: block; }

  hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
</style>
</head>
<body>

<header>
  <h1>Tracker</h1>
  <span id="date-display"></span>
</header>

<!-- FOOD SECTION -->
<div id="section-food" class="section active">
  <div class="card stat-big">
    <div class="number" id="cal-total" style="color: var(--accent)">0</div>
    <div class="label">calories today</div>
    <div class="goal-bar"><div class="goal-bar-fill" id="cal-bar" style="width:0%"></div></div>
    <div class="goal-text" id="cal-goal-text">Goal: <span id="cal-goal-display">2000</span> kcal &nbsp;<button class="hist-toggle" onclick="toggleGoalEdit('cal')">edit</button></div>
    <div id="cal-goal-edit" style="display:none" class="goal-row">
      <label>Daily calorie goal</label>
      <input type="number" id="cal-goal-input" placeholder="2000" style="width:90px;margin:0">
      <button class="btn btn-green" style="padding:8px 12px" onclick="saveCalGoal()">Save</button>
    </div>
  </div>

  <div class="card" style="padding-top:10px;padding-bottom:10px;">
    <div class="macros-row">
      <div class="macro-box">
        <div class="val" id="macro-p" style="color:#60a5fa">0g</div>
        <div class="lbl">protein</div>
      </div>
      <div class="macro-box">
        <div class="val" id="macro-c" style="color:#f59e0b">0g</div>
        <div class="lbl">carbs</div>
      </div>
      <div class="macro-box">
        <div class="val" id="macro-f" style="color:#f87171">0g</div>
        <div class="lbl">fat</div>
      </div>
    </div>
  </div>

  <div class="day-nav">
    <button onclick="changeDay('food',-1)">&#8592;</button>
    <div>
      <span class="day-nav-date" id="food-day-label"></span>
      <button class="today-btn" onclick="goToday('food')">Today</button>
    </div>
    <button onclick="changeDay('food',1)">&#8594;</button>
  </div>

  <div class="card">
    <div class="section-title">Add Food</div>
    <div class="form-row">
      <input type="text" id="food-name" placeholder="What did you eat?" style="flex:2">
      <input type="number" id="food-cal" placeholder="kcal" class="narrow" min="0">
    </div>
    <div class="form-row">
      <input type="number" id="food-protein" placeholder="Protein g" style="flex:1" min="0">
      <input type="number" id="food-carbs" placeholder="Carbs g" style="flex:1" min="0">
      <input type="number" id="food-fat" placeholder="Fat g" style="flex:1" min="0">
    </div>
    <button class="btn btn-green btn-full" onclick="addFood()">+ Add</button>
  </div>

  <div class="section-title">Today's Log</div>
  <div class="card" id="food-list">
    <div class="empty">Nothing logged yet</div>
  </div>
</div>

<!-- WORKOUT SECTION -->
<div id="section-workout" class="section">
  <div class="day-nav" style="margin-top:12px">
    <button onclick="changeDay('workout',-1)">&#8592;</button>
    <div>
      <span class="day-nav-date" id="workout-day-label"></span>
      <button class="today-btn" onclick="goToday('workout')">Today</button>
    </div>
    <button onclick="changeDay('workout',1)">&#8594;</button>
  </div>

  <div class="card stat-big" style="padding:16px">
    <div class="number" id="workout-total" style="color:var(--accent2);font-size:2rem">0</div>
    <div class="label">exercises logged today</div>
  </div>

  <div class="card">
    <div class="section-title">Log Exercise</div>
    <div class="form-row">
      <input type="text" id="ex-name" placeholder="Exercise (e.g. Bench Press)" style="flex:2">
      <select id="ex-type" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 8px;font-size:0.85rem">
        <option>Weights</option>
        <option>Cardio</option>
        <option>Bodyweight</option>
        <option>Stretching</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-row" id="weight-fields">
      <input type="number" id="ex-sets" placeholder="Sets" class="narrow" min="0">
      <input type="number" id="ex-reps" placeholder="Reps" class="narrow" min="0">
      <input type="number" id="ex-weight" placeholder="lbs/kg" class="medium" min="0">
    </div>
    <div class="form-row">
      <input type="number" id="ex-duration" placeholder="Duration (min)" style="flex:1" min="0">
      <input type="text" id="ex-notes" placeholder="Notes (optional)" style="flex:2">
    </div>
    <button class="btn btn-blue btn-full" onclick="addExercise()">+ Add Exercise</button>
  </div>

  <div class="section-title">Workout Log</div>
  <div class="card workout-entry" id="workout-list">
    <div class="empty">No exercises logged yet</div>
  </div>
</div>

<!-- INFO SECTION -->
<div id="section-info" class="section">
  <div class="card">
    <div class="section-title">Save Info</div>
    <input type="text" id="info-title" placeholder="Title (e.g. Doctor's number, Recipe, Goal...)">
    <textarea id="info-body" placeholder="Content..."></textarea>
    <div class="form-row" style="margin-bottom:0;margin-top:8px">
      <input type="text" id="info-tag" placeholder="Tag (optional, e.g. health)" style="flex:1">
      <button class="btn btn-yellow" onclick="addInfo()">+ Save</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap" id="tag-filters">
    <button class="btn btn-ghost active-filter" onclick="filterInfo('all')" data-filter="all">All</button>
  </div>

  <div id="info-list">
    <div class="empty">No info saved yet</div>
  </div>
</div>

<!-- DAILY SECTION -->
<div id="section-daily" class="section">
  <div class="card stat-big" style="padding:16px">
    <div class="number" id="daily-pct" style="color:var(--accent4);font-size:2.5rem">0%</div>
    <div class="label">habits done today</div>
  </div>

  <div class="card">
    <div class="section-title">Add Habit</div>
    <div class="form-row">
      <input type="text" id="habit-name" placeholder="New habit (e.g. Drink water, Walk, Read)" style="flex:1">
      <button class="btn btn-purple" onclick="addHabit()">+ Add</button>
    </div>
  </div>

  <div class="section-title">Today's Habits</div>
  <div class="card" id="habit-list">
    <div class="empty">No habits added yet</div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="section-title" style="margin-top:0">Quick Notes (Today)</div>
    <textarea id="daily-note" placeholder="Jot anything down for today..." style="min-height:100px"></textarea>
    <button class="btn btn-purple btn-full" onclick="saveDailyNote()">Save Note</button>
    <div id="saved-daily-note" style="margin-top:10px;font-size:0.88rem;color:#ccc;white-space:pre-wrap;word-break:break-word"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav>
  <button class="active" data-tab="food" onclick="switchTab('food')">
    <span class="icon">🥗</span>Food
  </button>
  <button data-tab="workout" onclick="switchTab('workout')">
    <span class="icon">💪</span>Workout
  </button>
  <button data-tab="info" onclick="switchTab('info')">
    <span class="icon">📋</span>Info
  </button>
  <button data-tab="daily" onclick="switchTab('daily')">
    <span class="icon">✅</span>Daily
  </button>
</nav>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let currentDays = { food: 0, workout: 0 }; // offset from today (0=today)
const todayKey = () => new Date().toISOString().split('T')[0];
const offsetKey = (offset) => {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split('T')[0];
};
const fmt = (key) => {
  const [y, m, d] = key.split('-');
  const dt = new Date(y, m - 1, d);
  const today = todayKey();
  if (key === today) return 'Today';
  const yest = offsetKey(-1);
  if (key === yest) return 'Yesterday';
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
};

function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  document.querySelector(`nav button[data-tab="${tab}"]`).classList.add('active');
  if (tab === 'food') renderFood();
  if (tab === 'workout') renderWorkout();
  if (tab === 'info') renderInfo();
  if (tab === 'daily') renderDaily();
}

function changeDay(section, dir) {
  currentDays[section] += dir;
  if (currentDays[section] > 0) currentDays[section] = 0;
  if (section === 'food') renderFood();
  else renderWorkout();
}
function goToday(section) {
  currentDays[section] = 0;
  if (section === 'food') renderFood();
  else renderWorkout();
}

// ─── Food ─────────────────────────────────────────────────────────────────────
function addFood() {
  const name = document.getElementById('food-name').value.trim();
  const cal = parseInt(document.getElementById('food-cal').value) || 0;
  if (!name) return flash('food-name', 'Enter food name');
  const entry = {
    id: Date.now(),
    name,
    cal,
    protein: parseFloat(document.getElementById('food-protein').value) || 0,
    carbs: parseFloat(document.getElementById('food-carbs').value) || 0,
    fat: parseFloat(document.getElementById('food-fat').value) || 0,
    time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
  };
  const key = 'food_' + todayKey();
  const list = load(key, []);
  list.push(entry);
  save(key, list);
  ['food-name','food-cal','food-protein','food-carbs','food-fat'].forEach(id => document.getElementById(id).value = '');
  renderFood();
}

function deleteFood(id) {
  const key = 'food_' + offsetKey(currentDays.food);
  const list = load(key, []).filter(e => e.id !== id);
  save(key, list);
  renderFood();
}

function renderFood() {
  const dayKey = offsetKey(currentDays.food);
  document.getElementById('food-day-label').textContent = fmt(dayKey);
  const list = load('food_' + dayKey, []);
  const goal = load('cal_goal', 2000);
  document.getElementById('cal-goal-display').textContent = goal;
  document.getElementById('cal-goal-input').value = goal;

  const totals = list.reduce((a, e) => {
    a.cal += e.cal; a.p += e.protein; a.c += e.carbs; a.f += e.fat; return a;
  }, { cal: 0, p: 0, c: 0, f: 0 });

  document.getElementById('cal-total').textContent = totals.cal;
  document.getElementById('macro-p').textContent = totals.p.toFixed(0) + 'g';
  document.getElementById('macro-c').textContent = totals.c.toFixed(0) + 'g';
  document.getElementById('macro-f').textContent = totals.f.toFixed(0) + 'g';

  const pct = Math.min(100, Math.round((totals.cal / goal) * 100));
  document.getElementById('cal-bar').style.width = pct + '%';
  document.getElementById('cal-bar').style.background = pct > 110 ? 'var(--danger)' : 'var(--accent)';

  const el = document.getElementById('food-list');
  if (!list.length) { el.innerHTML = '<div class="empty">Nothing logged yet</div>'; return; }

  el.innerHTML = list.slice().reverse().map(e => `
    <div class="entry">
      <div>
        <div class="entry-name">${esc(e.name)}</div>
        <div class="entry-meta">${e.time}${e.protein||e.carbs||e.fat ? ` &nbsp;·&nbsp; P:${e.protein}g C:${e.carbs}g F:${e.fat}g` : ''}</div>
      </div>
      <div class="entry-right">
        <span class="entry-cal">${e.cal} kcal</span>
        <button class="btn-danger" onclick="deleteFood(${e.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function toggleGoalEdit(type) {
  const el = document.getElementById(type + '-goal-edit');
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}
function saveCalGoal() {
  const v = parseInt(document.getElementById('cal-goal-input').value) || 2000;
  save('cal_goal', v);
  document.getElementById('cal-goal-edit').style.display = 'none';
  renderFood();
}

// ─── Workout ──────────────────────────────────────────────────────────────────
function addExercise() {
  const name = document.getElementById('ex-name').value.trim();
  if (!name) return flash('ex-name', 'Enter exercise name');
  const entry = {
    id: Date.now(),
    name,
    type: document.getElementById('ex-type').value,
    sets: document.getElementById('ex-sets').value || '',
    reps: document.getElementById('ex-reps').value || '',
    weight: document.getElementById('ex-weight').value || '',
    duration: document.getElementById('ex-duration').value || '',
    notes: document.getElementById('ex-notes').value.trim(),
    time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
  };
  const key = 'workout_' + todayKey();
  const list = load(key, []);
  list.push(entry);
  save(key, list);
  ['ex-name','ex-sets','ex-reps','ex-weight','ex-duration','ex-notes'].forEach(id => document.getElementById(id).value = '');
  renderWorkout();
}

function deleteExercise(id) {
  const key = 'workout_' + offsetKey(currentDays.workout);
  const list = load(key, []).filter(e => e.id !== id);
  save(key, list);
  renderWorkout();
}

function renderWorkout() {
  const dayKey = offsetKey(currentDays.workout);
  document.getElementById('workout-day-label').textContent = fmt(dayKey);
  const list = load('workout_' + dayKey, []);
  document.getElementById('workout-total').textContent = list.length;

  const el = document.getElementById('workout-list');
  if (!list.length) { el.innerHTML = '<div class="empty">No exercises logged yet</div>'; return; }

  el.innerHTML = list.slice().reverse().map(e => {
    let meta = e.type;
    if (e.sets) meta += ` · ${e.sets} sets`;
    if (e.reps) meta += ` × ${e.reps} reps`;
    if (e.weight) meta += ` @ ${e.weight}`;
    if (e.duration) meta += ` · ${e.duration}min`;
    return `
    <div class="entry">
      <div>
        <div class="entry-name">${esc(e.name)}</div>
        <div class="entry-meta">${meta}${e.notes ? ` · ${esc(e.notes)}` : ''}</div>
        <div class="entry-meta">${e.time}</div>
      </div>
      <div class="entry-right">
        <button class="btn-danger" onclick="deleteExercise(${e.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ─── Info ─────────────────────────────────────────────────────────────────────
let infoFilter = 'all';
function addInfo() {
  const title = document.getElementById('info-title').value.trim();
  const body = document.getElementById('info-body').value.trim();
  if (!title) return flash('info-title', 'Enter a title');
  const entry = {
    id: Date.now(),
    title,
    body,
    tag: document.getElementById('info-tag').value.trim().toLowerCase(),
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
  };
  const list = load('info_list', []);
  list.unshift(entry);
  save('info_list', list);
  ['info-title','info-body','info-tag'].forEach(id => document.getElementById(id).value = '');
  renderInfo();
}

function deleteInfo(id) {
  const list = load('info_list', []).filter(e => e.id !== id);
  save('info_list', list);
  renderInfo();
}

function filterInfo(tag) {
  infoFilter = tag;
  document.querySelectorAll('#tag-filters button').forEach(b => {
    b.classList.toggle('active-filter', b.dataset.filter === tag);
    b.style.borderColor = b.dataset.filter === tag ? 'var(--accent3)' : '';
    b.style.color = b.dataset.filter === tag ? 'var(--accent3)' : '';
  });
  renderInfoList();
}

function renderInfo() {
  const list = load('info_list', []);
  const tags = [...new Set(list.map(e => e.tag).filter(Boolean))];
  const filterEl = document.getElementById('tag-filters');
  filterEl.innerHTML = `<button class="btn btn-ghost" onclick="filterInfo('all')" data-filter="all" style="${infoFilter==='all'?'border-color:var(--accent3);color:var(--accent3)':''}">All</button>`;
  tags.forEach(t => {
    filterEl.innerHTML += `<button class="btn btn-ghost" onclick="filterInfo('${esc(t)}')" data-filter="${esc(t)}" style="${infoFilter===t?'border-color:var(--accent3);color:var(--accent3)':''}">${esc(t)}</button>`;
  });
  renderInfoList();
}

function renderInfoList() {
  const list = load('info_list', []);
  const filtered = infoFilter === 'all' ? list : list.filter(e => e.tag === infoFilter);
  const el = document.getElementById('info-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty">Nothing saved yet</div>'; return; }
  el.innerHTML = filtered.map(e => `
    <div class="info-card">
      <div class="info-card-title">
        <span>${esc(e.title)}</span>
        <button class="btn-danger" onclick="deleteInfo(${e.id})">✕</button>
      </div>
      ${e.body ? `<div class="info-card-body">${esc(e.body)}</div>` : ''}
      <div class="info-card-date">${e.date}${e.tag ? ` &nbsp;<span class="chip">${esc(e.tag)}</span>` : ''}</div>
    </div>
  `).join('');
}

// ─── Daily ────────────────────────────────────────────────────────────────────
function addHabit() {
  const name = document.getElementById('habit-name').value.trim();
  if (!name) return flash('habit-name', 'Enter habit name');
  const habits = load('habits', []);
  habits.push({ id: Date.now(), name });
  save('habits', habits);
  document.getElementById('habit-name').value = '';
  renderDaily();
}

function toggleHabit(id) {
  const key = 'habit_done_' + todayKey();
  const done = load(key, []);
  const idx = done.indexOf(id);
  if (idx === -1) done.push(id);
  else done.splice(idx, 1);
  save(key, done);
  renderDaily();
}

function deleteHabit(id) {
  const habits = load('habits', []).filter(h => h.id !== id);
  save('habits', habits);
  renderDaily();
}

function saveDailyNote() {
  const text = document.getElementById('daily-note').value.trim();
  save('daily_note_' + todayKey(), text);
  renderDailyNote();
}

function renderDailyNote() {
  const note = load('daily_note_' + todayKey(), '');
  const el = document.getElementById('saved-daily-note');
  el.textContent = note;
  if (note) document.getElementById('daily-note').value = note;
}

function renderDaily() {
  const habits = load('habits', []);
  const done = load('habit_done_' + todayKey(), []);
  const pct = habits.length ? Math.round((done.length / habits.length) * 100) : 0;
  document.getElementById('daily-pct').textContent = pct + '%';

  const el = document.getElementById('habit-list');
  if (!habits.length) { el.innerHTML = '<div class="empty">Add habits to track</div>'; return; }

  el.innerHTML = habits.map(h => {
    const isDone = done.includes(h.id);
    return `
    <div class="habit-row">
      <button class="habit-check ${isDone ? 'done' : ''}" onclick="toggleHabit(${h.id})">${isDone ? '✓' : ''}</button>
      <span class="habit-name ${isDone ? 'done' : ''}">${esc(h.name)}</span>
      <button class="btn-danger" onclick="deleteHabit(${h.id})">✕</button>
    </div>`;
  }).join('');

  renderDailyNote();
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function flash(id, msg) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--danger)';
  el.placeholder = msg;
  setTimeout(() => { el.style.borderColor = ''; }, 1500);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('date-display').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });
  renderFood();
}

init();
</script>
